<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skandan Enterprise – CK's Bakery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Outfit',sans-serif;
  background:#07090f;
  color:#e2e8f0;
  -webkit-font-smoothing:antialiased;
  font-size:14px;
}
button{font-family:'Outfit',sans-serif;cursor:pointer;}
input,select,textarea{font-family:'Outfit',sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px;}

/* ── CSS VARS ─────────────────────────────────────────── */
:root{
  --bg:       #07090f;
  --surf:     #0c1120;
  --card:     #101828;
  --card2:    #141f2e;
  --border:   rgba(255,255,255,.07);
  --border2:  rgba(255,255,255,.12);
  --txt:      #e2e8f0;
  --muted:    #64748b;
  --muted2:   #94a3b8;
  --green:    #10d9a0;
  --green2:   #0ea87a;
  --red:      #f05470;
  --blue:     #4d9ef7;
  --amber:    #f8a73e;
  --purple:   #9d7ef5;
  --cyan:     #22d3ee;
  --sidebar-w: 220px;
}

/* ── LAYOUT ───────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden;}
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  height:100%;background:var(--surf);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
  transition:transform .3s ease;
  z-index:50;
}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:13px 24px;background:var(--surf);border-bottom:1px solid var(--border);
}
.content{flex:1;overflow-y:auto;padding:24px;}
.content-inner{max-width:1080px;margin:0 auto;display:flex;flex-direction:column;gap:20px;}

/* ── MOBILE OVERLAY ───────────────────────────────────── */
.mob-overlay{
  display:none;position:fixed;inset:0;z-index:49;
  background:rgba(0,0,0,.7);backdrop-filter:blur(3px);
}

/* ── AUTH SCREEN ──────────────────────────────────────── */
#auth-screen{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.auth-bg-orb{
  position:absolute;border-radius:50%;pointer-events:none;
}
.auth-card{
  position:relative;width:100%;max-width:420px;margin:0 16px;
  background:var(--card);border:1px solid var(--border2);
  border-radius:20px;padding:36px;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
  animation:fadeUp .4s ease both;
}
.auth-logo{
  width:52px;height:52px;border-radius:14px;
  background:linear-gradient(135deg,#4d9ef7,#10d9a0);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
  box-shadow:0 6px 24px rgba(77,158,247,.3);
}
.auth-logo svg{color:#fff;}

/* ── FORM INPUTS ──────────────────────────────────────── */
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.ifield{
  width:100%;padding:10px 13px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border2);
  border-radius:9px;color:var(--txt);font-size:13px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.ifield:focus{border-color:rgba(77,158,247,.6);box-shadow:0 0 0 3px rgba(77,158,247,.1);}
.ifield::placeholder{color:var(--muted);}
.ifield option{background:#141f2e;color:var(--txt);}
.ifield:disabled{opacity:.45;cursor:not-allowed;}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4);}

/* ── BUTTONS ──────────────────────────────────────────── */
.btn-primary{
  padding:11px 20px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#4d9ef7,#10d9a0);
  color:#fff;font-weight:700;font-size:14px;
  box-shadow:0 4px 20px rgba(77,158,247,.3);
  transition:opacity .2s,transform .15s;
}
.btn-primary:hover{opacity:.9;}
.btn-primary:active{transform:scale(.98);}
.btn-ghost{
  padding:8px 16px;border-radius:9px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--border2);
  color:var(--muted2);font-size:12px;font-weight:500;
  transition:all .2s;
}
.btn-ghost:hover{color:#fff;border-color:rgba(77,158,247,.4);background:rgba(77,158,247,.08);}
.btn-pdf{
  padding:9px 18px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#f8a73e,#f05470);
  color:#fff;font-weight:700;font-size:12px;
  display:flex;align-items:center;gap:7px;
  box-shadow:0 4px 16px rgba(248,167,62,.25);
  transition:opacity .2s;
}
.btn-pdf:hover{opacity:.9;}
.btn-add-row{
  display:flex;align-items:center;gap:5px;
  background:none;border:none;color:var(--amber);
  font-size:12px;font-weight:600;padding:4px 0;
  transition:color .2s;
}
.btn-add-row:hover{color:#ffd077;}
.btn-del{
  padding:8px;background:rgba(240,84,112,.1);
  border:1px solid rgba(240,84,112,.2);
  border-radius:8px;color:var(--red);
  display:flex;align-items:center;
  transition:background .2s;
}
.btn-del:hover{background:rgba(240,84,112,.2);}

/* ── SIDEBAR ──────────────────────────────────────────── */
.sidebar-glow{
  position:absolute;top:-60px;left:50%;transform:translateX(-50%);
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(77,158,247,.07),transparent 70%);
  pointer-events:none;
}
.sidebar-brand{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.sidebar-brand-logo{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,#4d9ef7,#10d9a0);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(77,158,247,.25);flex-shrink:0;
}
.brand-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:#fff;line-height:1.2;}
.brand-sub{font-size:9px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;}
.nav-section-label{
  font-size:9.5px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;
  padding:4px 8px 8px;margin-top:4px;
}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 11px;border-radius:9px;border:none;
  font-size:13px;font-weight:500;width:100%;text-align:left;
  background:transparent;color:var(--muted);
  transition:all .2s;cursor:pointer;
  border-left:2px solid transparent;
}
.nav-item:hover{background:rgba(255,255,255,.04);color:#fff;}
.nav-item.active{
  background:linear-gradient(135deg,rgba(77,158,247,.14),rgba(16,217,160,.07));
  color:#fff;font-weight:600;
  border-left-color:#4d9ef7;
}
.nav-dot{
  width:5px;height:5px;border-radius:50%;
  background:#4d9ef7;box-shadow:0 0 6px #4d9ef7;
  margin-left:auto;
}
.sidebar-user{margin:12px;padding:12px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid var(--border);}
.user-avatar{
  width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#4d9ef7,#9d7ef5);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;flex-shrink:0;
}
.role-badge{
  font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;
  text-transform:uppercase;letter-spacing:.06em;
}
.role-owner{background:rgba(248,167,62,.12);color:var(--amber);}
.role-manager{background:rgba(77,158,247,.12);color:var(--blue);}
.btn-logout{
  display:flex;align-items:center;gap:6px;width:100%;
  padding:7px 9px;border-radius:7px;border:none;
  background:rgba(240,84,112,.06);color:var(--muted);
  font-size:11px;font-weight:500;margin-top:9px;
  transition:all .2s;
}
.btn-logout:hover{color:var(--red);background:rgba(240,84,112,.14);}

/* ── METRIC CARDS ─────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:13px;}
.kpi-card{
  border-radius:15px;padding:18px;position:relative;
  overflow:hidden;cursor:default;
  transition:transform .2s;
  animation:fadeUp .35s ease both;
}
.kpi-card:hover{transform:translateY(-2px);}
.kpi-glow{
  position:absolute;top:-20px;right:-20px;
  width:80px;height:80px;border-radius:50%;pointer-events:none;
}
.kpi-icon-wrap{
  width:36px;height:36px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;border:1px solid;
}
.kpi-value{
  font-family:'Syne',sans-serif;font-size:20px;font-weight:800;
  color:#fff;letter-spacing:-.5px;margin-bottom:3px;
}
.kpi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:3px;}

/* ── SECTION CARD ─────────────────────────────────────── */
.section-card{
  background:var(--card);border:1px solid var(--border2);
  border-radius:16px;padding:20px 22px;
  animation:fadeUp .35s ease both;
}
.section-card.accent-green{border-left:3px solid var(--green);}
.section-card.accent-red{border-left:3px solid var(--red);}
.section-card.accent-blue{border-left:3px solid var(--blue);}
.section-card.accent-amber{border-left:3px solid var(--amber);}
.section-card.accent-purple{border-left:3px solid var(--purple);}
.section-title{
  font-size:11px;font-weight:700;color:#fff;
  text-transform:uppercase;letter-spacing:.09em;margin-bottom:16px;
}

/* ── TABLE ────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:rgba(255,255,255,.02);}
thead th{
  padding:10px 14px;text-align:left;
  font-size:9.5px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;
}
tbody tr{border-top:1px solid rgba(255,255,255,.04);transition:background .15s;}
tbody tr:hover{background:rgba(255,255,255,.025);}
tbody td{padding:11px 14px;color:var(--muted2);white-space:nowrap;}
tfoot tr{border-top:2px solid rgba(77,158,247,.2);background:rgba(77,158,247,.04);}
tfoot td{padding:12px 14px;font-weight:800;font-size:12px;white-space:nowrap;}
.td-white{color:#fff;font-weight:600;}
.td-green{color:var(--green);font-weight:700;}
.td-red{color:var(--red);}
.td-amber{color:var(--amber);}
.td-blue{color:var(--blue);}
.td-purple{color:var(--purple);}
.td-profit-pos{color:var(--green);font-weight:700;}
.td-profit-neg{color:var(--red);font-weight:700;}

/* ── ALERTS ───────────────────────────────────────────── */
.alert-success{
  display:flex;align-items:center;gap:9px;
  padding:12px 16px;border-radius:10px;
  background:rgba(16,217,160,.08);border:1px solid rgba(16,217,160,.2);
  color:var(--green);font-size:13px;font-weight:500;
  animation:fadeUp .3s ease both;
}
.alert-owner{
  display:flex;align-items:center;gap:9px;
  padding:10px 16px;border-radius:10px;
  background:rgba(248,167,62,.07);border:1px solid rgba(248,167,62,.18);
  color:var(--amber);font-size:13px;
}
.alert-err{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-radius:9px;
  background:rgba(240,84,112,.1);border:1px solid rgba(240,84,112,.2);
  color:var(--red);font-size:13px;
}

/* ── CHART ────────────────────────────────────────────── */
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:130px;position:relative;}
.chart-bar-group{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:2px;height:100%;position:relative;cursor:pointer;
}
.chart-bar-group:hover .chart-tooltip{opacity:1;transform:translateY(0);}
.chart-tooltip{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translate(-50%,4px);
  background:#1a2744;border:1px solid var(--border2);border-radius:8px;
  padding:7px 10px;font-size:11px;white-space:nowrap;
  opacity:0;transition:opacity .15s,transform .15s;pointer-events:none;z-index:10;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.chart-bars-inner{display:flex;align-items:flex-end;gap:2px;width:100%;flex:1;}
.bar-sales{
  flex:1;border-radius:4px 4px 2px 2px;min-height:3px;
  background:linear-gradient(to top,#10d9a0,#4d9ef7);
  transition:height .4s ease;
}
.bar-exp{
  flex:1;border-radius:4px 4px 2px 2px;min-height:3px;
  background:linear-gradient(to top,#f05470,#f8a73e);
  transition:height .4s ease;
}
.chart-label{font-size:8px;color:var(--muted);}
.chart-grid-line{
  position:absolute;left:0;right:0;
  border-top:1px solid rgba(255,255,255,.04);pointer-events:none;
}
.chart-legend{display:flex;gap:14px;margin-top:10px;}
.legend-dot{width:10px;height:3px;border-radius:2px;display:inline-block;}

/* ── PROGRESS BAR ─────────────────────────────────────── */
.prog-bar-bg{height:5px;border-radius:3px;background:rgba(255,255,255,.06);}
.prog-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}

/* ── FORMULA BANNER ───────────────────────────────────── */
.formula-banner{
  padding:13px 18px;border-radius:12px;
  background:rgba(248,167,62,.06);border:1px solid rgba(248,167,62,.16);
}

/* ── DIVIDER ──────────────────────────────────────────── */
.divider{border:none;border-top:1px solid var(--border);margin:0;}

/* ── PAGE HEADER ──────────────────────────────────────── */
.page-header{animation:fadeUp .3s ease both;}
.page-title{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;color:#fff;}
.page-sub{color:var(--muted);font-size:13px;margin-top:4px;}

/* ── ANIMATIONS ───────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── MOBILE ───────────────────────────────────────────── */
@media(max-width:768px){
  :root{--sidebar-w:220px;}
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);z-index:50;}
  .sidebar.open{transform:translateX(0);}
  .mob-overlay.show{display:block;}
  .mob-menu-btn{display:flex!important;}
  .content{padding:16px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .kpi-value{font-size:16px;}
  table{min-width:600px;}
}
.mob-menu-btn{display:none;align-items:center;justify-content:center;
  padding:8px;border-radius:8px;background:rgba(255,255,255,.06);
  border:none;color:var(--muted2);}
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-bg-orb" style="width:500px;height:500px;top:5%;left:5%;background:radial-gradient(circle,rgba(77,158,247,.06),transparent 70%);"></div>
  <div class="auth-bg-orb" style="width:400px;height:400px;bottom:5%;right:5%;background:radial-gradient(circle,rgba(16,217,160,.05),transparent 70%);"></div>
  <div id="auth-dots" style="position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
        <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
      </svg>
    </div>
    <h1 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;letter-spacing:-.4px;">Skandan Enterprise</h1>
    <p style="color:var(--muted);font-size:12px;margin-top:5px;letter-spacing:.05em;text-transform:uppercase;">CK's Bakery Franchise · Operations Portal</p>

    <div style="height:1px;background:var(--border);margin:22px 0;"></div>

    <form id="login-form" style="display:flex;flex-direction:column;gap:15px;">
      <div class="field">
        <label>Email Address</label>
        <input class="ifield" type="email" id="login-email" placeholder="owner@skandan.in" required>
      </div>
      <div class="field">
        <label>Password</label>
        <div style="position:relative;">
          <input class="ifield" type="password" id="login-pass" placeholder="••••••••" required style="padding-right:42px;">
          <button type="button" id="toggle-pass" style="position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);display:flex;align-items:center;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="login-err" class="alert-err" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span id="login-err-msg"></span>
      </div>
      <button type="submit" class="btn-primary" id="login-btn" style="width:100%;margin-top:4px;">Sign In to Dashboard →</button>
    </form>

    <div style="margin-top:20px;padding-top:18px;border-top:1px solid var(--border);">
      <p style="font-size:10px;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px;">Demo Credentials</p>
      <div style="display:flex;flex-direction:column;gap:6px;" id="demo-creds"></div>
    </div>
  </div>
</div>

<!-- App Shell (hidden until login) -->
<div id="app" style="display:none;">
  <div class="mob-overlay" id="mob-overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-glow"></div>
    <div class="sidebar-brand">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="sidebar-brand-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
            <line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Skandan</div>
          <div class="brand-sub">Enterprise</div>
        </div>
      </div>
    </div>

    <nav style="flex:1;padding:12px 10px;display:flex;flex-direction:column;">
      <div class="nav-section-label">Navigation</div>
      <button class="nav-item active" data-view="dashboard">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
        <span class="nav-dot"></span>
      </button>
      <button class="nav-item" data-view="entry">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Daily Entry
      </button>

<script>
// ═══════════════════════════════════════════════════════════
// DATA & HELPERS
// ═══════════════════════════════════════════════════════════
const USERS = [
  {id:'u1',email:'owner@skandan.in',  password:'owner123',   role:'owner',   name:'Skandan Kumar', avatar:'SK'},
  {id:'u2',email:'manager@skandan.in',password:'manager123', role:'manager', name:'Ravi Krishnan',  avatar:'RK'},
];

const r=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
const INR=n=>'₹'+Number(n||0).toLocaleString('en-IN');
const PCT=n=>Number(n||0).toFixed(2)+'%';
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// Seed 60 days of mock data
const seedDB=()=>{
  const arr=[]; const now=new Date();
  for(let i=59;i>=0;i--){
    const d=new Date(now); d.setDate(d.getDate()-i);
    const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const cash=r(4000,9500),card=r(2500,7000),swiggy=r(1000,5500);
    arr.push({
      id:`e${i}`,date:ds,
      sales:{cash,card,swiggy},
      expenses:[
        {item:'Flour & Wheat',amount:r(800,2200),category:'Raw Materials'},
        {item:'Electricity',  amount:r(200,600), category:'Utilities'},
        {item:'Staff Wages',  amount:r(600,1400),category:'Salary'},
        {item:'Packaging',    amount:r(100,350), category:'Miscellaneous'},
      ],
      purchaseOrders:[{vendor:'Metro Wholesale',invoice:`INV-${1000+i}`,paid:r(1000,4000),pending:r(0,900)}],
      openingStock:r(8000,14000),closingStock:r(6000,12000),
      wastage:[{item:'Bread Loaves',quantity:r(2,14),cost:r(120,750)}],
      cashPosition:{cashInHand:r(3000,8500),cashInBank:r(10000,32000)},
    });
  }
  return arr;
};

let DB=seedDB();
let currentUser=null;
let currentView='dashboard';

const totals=e=>{
  if(!e)return{sales:0,expenses:0,wastage:0,po:0,profit:0};
  const sales=(e.sales?.cash||0)+(e.sales?.card||0)+(e.sales?.swiggy||0);
  const expenses=(e.expenses||[]).reduce((s,x)=>s+(x.amount||0),0);
  const wastage=(e.wastage||[]).reduce((s,w)=>s+(w.cost||0),0);
  const po=(e.purchaseOrders||[]).reduce((s,p)=>s+(p.paid||0)+(p.pending||0),0);
  return{sales,expenses,wastage,po,profit:sales-expenses-wastage};
};

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
const $ =id=>document.getElementById(id);
const $q=(sel,ctx=document)=>ctx.querySelector(sel);
const $qa=(sel,ctx=document)=>[...ctx.querySelectorAll(sel)];

// Demo credential buttons
const demoCreds=$('demo-creds');
USERS.forEach(u=>{
  const btn=document.createElement('button');
  btn.className='btn-ghost';
  btn.style.cssText='display:flex;align-items:center;justify-content:space-between;width:100%;font-size:11px;';
  btn.innerHTML=`<span style="display:flex;align-items:center;gap:7px;"><span class="role-badge ${u.role==='owner'?'role-owner':'role-manager'}">${u.role}</span>${u.email}</span><span style="color:rgba(255,255,255,.2)">/ ${u.password}</span>`;
  btn.addEventListener('click',()=>{$('login-email').value=u.email;$('login-pass').value=u.password;});
  demoCreds.appendChild(btn);
});

$('toggle-pass').addEventListener('click',()=>{
  const inp=$('login-pass');
  inp.type=inp.type==='password'?'text':'password';
});

$('login-form').addEventListener('submit',async e=>{
  e.preventDefault();
  const email=$('login-email').value.trim();
  const pass=$('login-pass').value;
  $('login-btn').textContent='Signing in…';$('login-btn').disabled=true;
  $('login-err').style.display='none';
  await new Promise(r=>setTimeout(r,600));
  const user=USERS.find(u=>u.email===email&&u.password===pass);
  if(user){
    currentUser=user;
    $('auth-screen').style.display='none';
    $('app').style.display='flex';
    initApp();
  } else {
    $('login-err-msg').textContent='Invalid credentials. Please try again.';
    $('login-err').style.display='flex';
  }
  $('login-btn').textContent='Sign In to Dashboard →';$('login-btn').disabled=false;
});

// ═══════════════════════════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════════════════════════
function initApp(){
  // Update sidebar user info
  $('user-avatar-sb').textContent=currentUser.avatar;
  $('user-name-sb').textContent=currentUser.name;
  const rb=$('user-role-badge');
  rb.textContent=currentUser.role==='owner'?'Owner':'Manager';
  rb.className='role-badge '+(currentUser.role==='owner'?'role-owner':'role-manager');

  // Topbar
  const tbrb=$('topbar-role-badge');
  tbrb.textContent=currentUser.role==='owner'?'👁 View Only':'✏️ Full Access';
  tbrb.className='role-badge '+(currentUser.role==='owner'?'role-owner':'role-manager');

  $('topbar-date').textContent=new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  // Nav clicks
  $qa('.nav-item').forEach(btn=>{
    btn.addEventListener('click',()=>{
      currentView=btn.dataset.view;
      $qa('.nav-item').forEach(b=>{b.classList.remove('active');$q('.nav-dot',b)?.remove();});
      btn.classList.add('active');
      const dot=document.createElement('span');dot.className='nav-dot';btn.appendChild(dot);
      closeSidebar();
      renderView();
    });
  });

  // Logout
  $('btn-logout').addEventListener('click',()=>{
    currentUser=null;currentView='dashboard';
    $('app').style.display='none';
    $('auth-screen').style.display='flex';
    $('login-email').value='';$('login-pass').value='';
  });

  // Mobile
  $('mob-menu-btn').addEventListener('click',()=>{
    $('sidebar').classList.add('open');
    $('mob-overlay').classList.add('show');
  });
  $('mob-overlay').addEventListener('click',closeSidebar);

  renderView();
}

function closeSidebar(){
  $('sidebar').classList.remove('open');
  $('mob-overlay').classList.remove('show');
}

const viewTitles={dashboard:'Operations Overview',entry:'Daily Entry',weekly:'Weekly Summary',monthly:'Monthly Report'};
function renderView(){
  $('topbar-title').textContent=viewTitles[currentView];
  const out=$('page-content');
  out.innerHTML='';
  if(currentView==='dashboard') renderDashboard(out);
  else if(currentView==='entry') renderEntry(out);
  else if(currentView==='weekly') renderWeekly(out);
  else if(currentView==='monthly') renderMonthly(out);
}

// ═══════════════════════════════════════════════════════════
// SVG ICON HELPER
// ═══════════════════════════════════════════════════════════
function svg(paths,size=16){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${Array.isArray(paths)?paths.map(p=>`<path d="${p}"/>`).join(''):paths}</svg>`;
}
const SVGS={
  trend:['M23 6l-9.5 9.5-5-5L1 18','M17 6h6v6'],
  warn:['M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z','M12 9v4','M12 17h.01'],
  cash:'M12 1v22 M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6',
  trash:['M3 6h18','M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2'],
  star:['M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z'],
  box:['M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z','M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16'],
  check:'M20 6L9 17l-5-5',
  plus:'M12 5v14 M5 12h14',
  lock:['M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z','M7 11V7a5 5 0 0 1 10 0v4'],
  pdf:['M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z','M14 2v6h6','M16 13H8','M16 17H8','M10 9H8'],
};

// ═══════════════════════════════════════════════════════════
// KPI CARD HTML
// ═══════════════════════════════════════════════════════════
const KPI_STYLES={
  green:{g:'linear-gradient(135deg,rgba(16,217,160,.12),rgba(16,217,160,.04))',b:'rgba(16,217,160,.22)',ic:'rgba(16,217,160,.15)',c:'#10d9a0',glow:'rgba(16,217,160,.15)'},
  red:  {g:'linear-gradient(135deg,rgba(240,84,112,.12),rgba(240,84,112,.04))',b:'rgba(240,84,112,.22)',ic:'rgba(240,84,112,.15)',c:'#f05470',glow:'rgba(240,84,112,.15)'},
  blue: {g:'linear-gradient(135deg,rgba(77,158,247,.12),rgba(77,158,247,.04))',b:'rgba(77,158,247,.22)',ic:'rgba(77,158,247,.15)',c:'#4d9ef7',glow:'rgba(77,158,247,.15)'},
  amber:{g:'linear-gradient(135deg,rgba(248,167,62,.12),rgba(248,167,62,.04))',b:'rgba(248,167,62,.22)',ic:'rgba(248,167,62,.15)',c:'#f8a73e',glow:'rgba(248,167,62,.15)'},
  purple:{g:'linear-gradient(135deg,rgba(157,126,245,.12),rgba(157,126,245,.04))',b:'rgba(157,126,245,.22)',ic:'rgba(157,126,245,.15)',c:'#9d7ef5',glow:'rgba(157,126,245,.15)'},
};

function kpiCard(label,value,sub,iconKey,accent,delay=0){
  const s=KPI_STYLES[accent]||KPI_STYLES.blue;
  return `<div class="kpi-card" style="background:${s.g};border:1px solid ${s.b};animation-delay:${delay}ms;">
    <div class="kpi-glow" style="background:radial-gradient(circle,${s.glow},transparent 70%);"></div>
    <div class="kpi-icon-wrap" style="background:${s.ic};border-color:${s.b};">${svg(SVGS[iconKey]||SVGS.trend,15)}</div>
    <div class="kpi-value">${value}</div>
    <div class="kpi-label" style="color:${s.c}">${label}</div>
    ${sub?`<div class="kpi-sub">${sub}</div>`:''}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// DASHBOARD VIEW
// ═══════════════════════════════════════════════════════════
function renderDashboard(out){
  const last7=DB.slice(-7);
  const todayE=DB[DB.length-1];
  const td=totals(todayE);
  const w7=last7.reduce((a,e)=>{const t=totals(e);return{sales:a.sales+t.sales,exp:a.exp+t.expenses,waste:a.waste+t.wastage,profit:a.profit+t.profit};},{sales:0,exp:0,waste:0,profit:0});
  const wPct=w7.sales>0?(w7.waste/w7.sales)*100:0;

  const chart14=DB.slice(-14);
  const maxS=Math.max(...chart14.map(e=>totals(e).sales),1);

  // Sales breakdown prog bars
  const pbRows=[
    ['Cash Sales',todayE?.sales?.cash||0,'#10d9a0'],
    ['Card / UPI',todayE?.sales?.card||0,'#4d9ef7'],
    ['Swiggy / Zomato',todayE?.sales?.swiggy||0,'#f8a73e'],
  ];

  out.innerHTML=`
  <!-- Header -->
  <div class="page-header">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <div>
        <div class="page-title">Operations Overview</div>
        <div class="page-sub">CK's Bakery Franchise · Real-time metrics</div>
      </div>
      <div style="padding:5px 13px;border-radius:7px;background:rgba(16,217,160,.1);border:1px solid rgba(16,217,160,.2);font-size:11px;font-weight:700;color:var(--green);letter-spacing:.05em;">● LIVE</div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-grid">
    ${kpiCard("Today's Sales",INR(td.sales),'Today','trend','green',0)}
    ${kpiCard("Today's Expenses",INR(td.expenses),'Today','warn','red',50)}
    ${kpiCard('Cash in Hand',INR(todayE?.cashPosition?.cashInHand),'End of Day','cash','blue',100)}
    ${kpiCard('7-Day Wastage',PCT(wPct),'of gross sales','trash','amber',150)}
    ${kpiCard('7-Day Net Profit',INR(w7.profit),'Last 7 days','star','purple',200)}
  </div>

  <!-- Chart + Breakdown -->
  <div style="display:grid;grid-template-columns:1fr 320px;gap:16px;" class="dash-2col">
    <div class="section-card" style="animation-delay:120ms">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;">
        <div>
          <div class="section-title" style="margin-bottom:2px;">14-Day Sales Trend</div>
          <div style="font-size:11px;color:var(--muted);">Hover / tap bars for details</div>
        </div>
        <div class="chart-legend">
          <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);">
            <span class="legend-dot" style="background:var(--green);"></span>Sales
          </span>
          <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);">
            <span class="legend-dot" style="background:var(--red);"></span>Expenses
          </span>
        </div>
      </div>
      <div class="chart-bars" id="chart-bars">
        ${[25,50,75,100].map(p=>`<div class="chart-grid-line" style="bottom:${p}%;"></div>`).join('')}
        ${chart14.map((e,i)=>{
          const t=totals(e);
          const sh=(t.sales/maxS)*100;
          const eh=(t.expenses/maxS)*100;
          const day=DAYS[new Date(e.date+'T00:00:00').getDay()];
          return `<div class="chart-bar-group">
            <div class="chart-tooltip">
              <div style="color:#94a3b8;margin-bottom:3px;">${e.date}</div>
              <div style="color:var(--green)">Sales: ${INR(t.sales)}</div>
              <div style="color:var(--red)">Exp: ${INR(t.expenses)}</div>
            </div>
            <div class="chart-bars-inner">
              <div class="bar-sales" style="height:${sh}%"></div>
              <div class="bar-exp" style="height:${eh}%"></div>
            </div>
            <div class="chart-label">${day[0]}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="section-card" style="animation-delay:170ms">
      <div class="section-title">Today's Sales Breakdown</div>
      ${pbRows.map(([label,val,col])=>{
        const pct=td.sales>0?(val/td.sales)*100:0;
        return `<div style="margin-bottom:16px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;">
            <span style="color:var(--muted)">${label}</span>
            <span style="color:#fff;font-weight:700">${INR(val)}</span>
          </div>
          <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${pct}%;background:${col};box-shadow:0 0 8px ${col}80;"></div></div>
          <div style="font-size:10px;color:var(--muted);text-align:right;margin-top:3px;">${pct.toFixed(1)}%</div>
        </div>`;
      }).join('')}
      <hr class="divider" style="margin:16px 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--muted);">Total Gross Sales</span>
        <span style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#fff;">${INR(td.sales)}</span>
      </div>
    </div>
  </div>

  <!-- Recent Table -->
  <div class="section-card" style="padding:0;animation-delay:220ms;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
      <div class="section-title" style="margin-bottom:0;">Recent 7 Days</div>
      <span style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;">All in ₹</span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Date</th><th>Day</th><th>Gross Sales</th>
          <th>Expenses</th><th>Wastage</th><th>Net Profit</th><th>Cash in Hand</th>
        </tr></thead>
        <tbody>
          ${DB.slice(-7).reverse().map(e=>{
            const t=totals(e);
            const day=DAYS[new Date(e.date+'T00:00:00').getDay()];
            return `<tr>
              <td class="td-white">${e.date}</td>
              <td>${day}</td>
              <td class="td-green">${INR(t.sales)}</td>
              <td class="td-red">${INR(t.expenses)}</td>
              <td class="td-amber">${INR(t.wastage)}</td>
              <td class="${t.profit>=0?'td-profit-pos':'td-profit-neg'}">${INR(t.profit)}</td>
              <td class="td-blue">${INR(e.cashPosition?.cashInHand)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>
  `;

  // Responsive 2-col
  const col2=out.querySelector('.dash-2col');
  const check=()=>col2.style.gridTemplateColumns=window.innerWidth<720?'1fr':'1fr 320px';
  check(); window.addEventListener('resize',check);
}

// ═══════════════════════════════════════════════════════════

  <div class="section-card accent-green">
    <div class="section-title">💰 Daily Gross Sales</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;" class="grid3">
      <div class="field"><label>Cash Sales (₹)</label><input class="ifield e-sale" type="number" min="0" placeholder="0" id="e-cash" ${dis}></div>
      <div class="field"><label>Card / UPI (₹)</label><input class="ifield e-sale" type="number" min="0" placeholder="0" id="e-card" ${dis}></div>
      <div class="field"><label>Swiggy / Zomato (₹)</label><input class="ifield e-sale" type="number" min="0" placeholder="0" id="e-swiggy" ${dis}></div>

  <!-- Expenses -->
  <div class="section-card accent-red">
    <div class="section-title">🧾 Expenses</div>

  </div>

  <!-- POs -->
  <div class="section-card accent-purple">
    <div class="section-title">📦 Purchase Orders</div>
    <div id="po-rows"></div>
    ${canEdit?`<button class="btn-add-row" id="add-po">${svg(SVGS.plus,13)} Add Purchase Order</button>`:''}
  </div>

  <!-- Stock -->
  <div class="section-card accent-amber">
    <div class="section-title">📊 Opening & Closing Stock</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;" class="grid2">
      <div class="field"><label>Opening Stock Value (₹)</label><input class="ifield" type="number" min="0" placeholder="0.00" id="e-open" ${dis}></div>
      <div class="field"><label>Closing Stock Value (₹)</label><input class="ifield" type="number" min="0" placeholder="0.00" id="e-close" ${dis}></div>
    </div>
    <div style="margin-top:9px;font-size:12px;" id="stock-diff"></div>
  </div>

  <!-- Wastage -->
  <div class="section-card accent-amber">
    <div class="section-title">⚠️ Wastage Details</div>
    <div id="waste-rows"></div>
    ${canEdit?`<button class="btn-add-row" id="add-waste">${svg(SVGS.plus,13)} Add Wastage Item</button>`:''}
  </div>

  <!-- Cash Position -->
  <div class="section-card accent-blue">
    <div class="section-title">💵 End-of-Day Cash Position</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;" class="grid2">
      <div class="field"><label>Cash in Hand (₹)</label><input class="ifield" type="number" min="0" placeholder="0.00" id="e-cin" ${dis}></div>
      <div class="field"><label>Cash in Bank / Account (₹)</label><input class="ifield" type="number" min="0" placeholder="0.00" id="e-cbank" ${dis}></div>
    </div>
  </div>

  ${canEdit
    ?`<button class="btn-primary" id="save-entry" style="width:100%;padding:14px;font-size:15px;">Save Daily Entry</button>`
    :`<div style="text-align:center;padding:13px;border-radius:12px;background:rgba(248,167,62,.05);border:1px solid rgba(248,167,62,.14);color:var(--muted);font-size:13px;">
        ${svg(SVGS.lock)} Entry saving is restricted to the Store Manager
      </div>`
  }
  `;

  // Responsive grids
  const fix=()=>{
    const is1col=window.innerWidth<580;
    out.querySelectorAll('.grid2').forEach(g=>g.style.gridTemplateColumns=is1col?'1fr':'1fr 1fr');
    out.querySelectorAll('.grid3').forEach(g=>g.style.gridTemplateColumns=is1col?'1fr':'repeat(3,1fr)');
  };
  fix(); window.addEventListener('resize',fix);

  // Dynamic row state
  const expRows=[{item:'',amount:'',category:'Raw Materials'}];
  const poRows=[{vendor:'',invoice:'',paid:'',pending:''}];
  const wasteRows=[{item:'',quantity:'',cost:''}];

  function renderExpRows(){
    const c=$('exp-rows'); c.innerHTML='';
    expRows.forEach((r,i)=>{
      const wrap=document.createElement('div');
      wrap.style.cssText='display:grid;grid-template-columns:3fr 2fr 2fr auto;gap:10px;margin-bottom:10px;align-items:end;';
      wrap.innerHTML=`
        <div class="field">${i===0?'<label>Item Name</label>':''}<input class="ifield" placeholder="e.g. Flour" value="${r.item||''}" ${dis}></div>
        <div class="field">${i===0?'<label>Amount (₹)</label>':''}<input class="ifield" type="number" min="0" placeholder="0" value="${r.amount||''}" ${dis}></div>
        <div class="field">${i===0?'<label>Category</label>':''}
          <select class="ifield" ${dis}>
            ${['Raw Materials','Utilities','Salary','Miscellaneous'].map(c=>`<option${r.category===c?' selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div style="padding-bottom:2px;">${canEdit&&expRows.length>1?`<button class="btn-del" data-i="${i}">${svg(SVGS.trash,13)}</button>`:''}</div>
      `;
      const [inp1,inp2,sel]=wrap.querySelectorAll('.ifield');
      inp1.addEventListener('input',e=>{expRows[i].item=e.target.value;updateExpTotal();});
      inp2.addEventListener('input',e=>{expRows[i].amount=e.target.value;updateExpTotal();});
      sel.addEventListener('change',e=>{expRows[i].category=e.target.value;});
      wrap.querySelector('.btn-del')?.addEventListener('click',()=>{expRows.splice(i,1);renderExpRows();});
      c.appendChild(wrap);
    });
  }

  function updateExpTotal(){
    const tot=expRows.reduce((s,r)=>s+(+r.amount||0),0);
    $('exp-total').textContent=tot>0?`Total Expenses: ${INR(tot)}`:'';
  }

  function updateSalesPreview(){
    const v=(+($('e-cash')?.value||0))+(+($('e-card')?.value||0))+(+($('e-swiggy')?.value||0));
    $('sales-preview').textContent=INR(v);
  }

  function renderPORows(){
    const c=$('po-rows'); c.innerHTML='';
    poRows.forEach((r,i)=>{
      const wrap=document.createElement('div');
      wrap.style.cssText='display:grid;grid-template-columns:2fr 2fr 1.5fr 1.5fr auto;gap:10px;margin-bottom:10px;align-items:end;';
      if(window.innerWidth<640) wrap.style.gridTemplateColumns='1fr 1fr';
      wrap.innerHTML=`
        <div class="field">${i===0?'<label>Vendor</label>':''}<input class="ifield" placeholder="Vendor name" value="${r.vendor||''}" ${dis}></div>
        <div class="field">${i===0?'<label>Invoice No.</label>':''}<input class="ifield" placeholder="INV-001" value="${r.invoice||''}" ${dis}></div>
        <div class="field">${i===0?'<label>Paid (₹)</label>':''}<input class="ifield" type="number" min="0" placeholder="0" value="${r.paid||''}" ${dis}></div>
        <div class="field">${i===0?'<label>Pending (₹)</label>':''}<input class="ifield" type="number" min="0" placeholder="0" value="${r.pending||''}" ${dis}></div>
        <div style="padding-bottom:2px;">${canEdit&&poRows.length>1?`<button class="btn-del" data-i="${i}">${svg(SVGS.trash,13)}</button>`:''}</div>
      `;
      const [v,iv,pd,pe]=wrap.querySelectorAll('.ifield');
      v.addEventListener('input',e=>poRows[i].vendor=e.target.value);
      iv.addEventListener('input',e=>poRows[i].invoice=e.target.value);
      pd.addEventListener('input',e=>poRows[i].paid=e.target.value);
      pe.addEventListener('input',e=>poRows[i].pending=e.target.value);
      wrap.querySelector('.btn-del')?.addEventListener('click',()=>{poRows.splice(i,1);renderPORows();});
      c.appendChild(wrap);
    });
  }

  function renderWasteRows(){
    const c=$('waste-rows'); c.innerHTML='';
    wasteRows.forEach((r,i)=>{
      const wrap=document.createElement('div');
      wrap.style.cssText='display:grid;grid-template-columns:3fr 1.5fr 1.5fr auto;gap:10px;margin-bottom:10px;align-items:end;';
      wrap.innerHTML=`
        <div class="field">${i===0?'<label>Item Name</label>':''}<input class="ifield" placeholder="e.g. Bread Loaves" value="${r.item||''}" ${dis}></div>
        <div class="field">${i===0?'<label>Qty</label>':''}<input class="ifield" type="number" min="0" placeholder="0" value="${r.quantity||''}" ${dis}></div>
        <div class="field">${i===0?'<label>Cost Value (₹)</label>':''}<input class="ifield" type="number" min="0" placeholder="0" value="${r.cost||''}" ${dis}></div>
        <div style="padding-bottom:2px;">${canEdit&&wasteRows.length>1?`<button class="btn-del" data-i="${i}">${svg(SVGS.trash,13)}</button>`:''}</div>
      `;
      const [it,qt,ct]=wrap.querySelectorAll('.ifield');
      it.addEventListener('input',e=>wasteRows[i].item=e.target.value);
      qt.addEventListener('input',e=>wasteRows[i].quantity=e.target.value);
      ct.addEventListener('input',e=>wasteRows[i].cost=e.target.value);
      wrap.querySelector('.btn-del')?.addEventListener('click',()=>{wasteRows.splice(i,1);renderWasteRows();});
      c.appendChild(wrap);
    });
  }

  renderExpRows(); renderPORows(); renderWasteRows();
  out.querySelectorAll('.e-sale').forEach(inp=>inp.addEventListener('input',updateSalesPreview));

  // Stock diff
  [$('e-open'),$('e-close')].forEach(inp=>inp?.addEventListener('input',()=>{
    const o=+$('e-open').value||0, c=+$('e-close').value||0;
    if(o&&c) $('stock-diff').innerHTML=`<span style="color:${c-o>=0?'var(--green)':'var(--amber)'}">Stock Movement: <strong>${INR(c-o)}</strong> (${c-o>=0?'Gain':'Loss'})</span>`;
  }));

  if(canEdit){
    $('add-exp')?.addEventListener('click',()=>{expRows.push({item:'',amount:'',category:'Raw Materials'});renderExpRows();});
    $('add-po')?.addEventListener('click',()=>{poRows.push({vendor:'',invoice:'',paid:'',pending:''});renderPORows();});
    $('add-waste')?.addEventListener('click',()=>{wasteRows.push({item:'',quantity:'',cost:''});renderWasteRows();});

    $('save-entry')?.addEventListener('click',()=>{
      const date=$('e-date').value;
      if(!date){alert('Please select a date.');return;}
      const entry={
        id:`entry-${Date.now()}`, date,
        sales:{cash:+$('e-cash').value||0,card:+$('e-card').value||0,swiggy:+$('e-swiggy').value||0},
        expenses:expRows.filter(r=>r.item).map(r=>({...r,amount:+r.amount||0})),
        purchaseOrders:poRows.filter(r=>r.vendor).map(r=>({...r,paid:+r.paid||0,pending:+r.pending||0})),
        openingStock:+$('e-open').value||0,
        closingStock:+$('e-close').value||0,
        wastage:wasteRows.filter(r=>r.item).map(r=>({...r,quantity:+r.quantity||0,cost:+r.cost||0})),
        cashPosition:{cashInHand:+$('e-cin').value||0,cashInBank:+$('e-cbank').value||0},
      };
      DB=[...DB.filter(e=>e.date!==date),entry].sort((a,b)=>a.date.localeCompare(b.date));
      const suc=$('entry-success');
      $('entry-success-msg').textContent=`Entry for ${date} saved successfully!`;
      suc.style.display='flex';
      suc.scrollIntoView({behavior:'smooth',block:'center'});
      setTimeout(()=>suc.style.display='none',4000);
    });
  }
}

// WEEKLY VIEW
// ═══════════════════════════════════════════════════════════
let weeklyOffset=0;
function renderWeekly(out){
  const getWeekDates=offset=>{
    const now=new Date(); const day=now.getDay();
    const mon=new Date(now); mon.setDate(now.getDate()-(day===0?6:day-1)+offset*7);
    return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;});
  };

  const weekDates=getWeekDates(weeklyOffset);
  const wEntries=weekDates.map(d=>DB.find(e=>e.date===d)||null);
  const wTot=wEntries.reduce((a,e)=>{if(!e)return a;const t=totals(e);return{sales:a.sales+t.sales,exp:a.exp+t.expenses,waste:a.waste+t.wastage,profit:a.profit+t.profit,po:a.po+t.po};},{sales:0,exp:0,waste:0,profit:0,po:0});
  const wPct=wTot.sales>0?(wTot.waste/wTot.sales)*100:0;
  const WDAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  out.innerHTML=`
  <div class="page-header">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
      <div>
        <div class="page-title">Weekly Summary</div>
        <div class="page-sub">${weekDates[0]} → ${weekDates[6]}</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-ghost" id="w-prev">← Prev</button>
        <button class="btn-ghost" id="w-cur" style="color:var(--blue);border-color:rgba(77,158,247,.35)">This Week</button>
        <button class="btn-ghost" id="w-next">Next →</button>
      </div>
    </div>
  </div>

  <div class="kpi-grid">
    ${kpiCard('Total Sales',INR(wTot.sales),'This Week','trend','green',0)}
    ${kpiCard('Total Expenses',INR(wTot.exp),'This Week','warn','red',50)}
    ${kpiCard('Total POs',INR(wTot.po),'This Week','box','blue',100)}
    ${kpiCard('Total Wastage',INR(wTot.waste)+` (${PCT(wPct)})`,'of sales','trash','amber',150)}
    ${kpiCard('Net Profit',INR(wTot.profit),'This Week','star',wTot.profit>=0?'green':'red',200)}
  </div>

  <div class="section-card" style="padding:0;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);">
      <div class="section-title" style="margin-bottom:0;">Mon → Sun Daily Breakdown</div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Day</th><th>Date</th><th>Gross Sales</th>
          <th>Cash</th><th>Card/UPI</th><th>Swiggy/Zomato</th>
          <th>Expenses</th><th>PO</th><th>Wastage</th><th>Net Profit</th>
        </tr></thead>
        <tbody>
          ${weekDates.map((d,i)=>{
            const e=wEntries[i]; const t=e?totals(e):null;
            return `<tr>
              <td style="font-weight:700;color:${i===6?'var(--amber)':'var(--blue)'}">${WDAYS[i]}</td>
              <td style="color:var(--muted)">${d}</td>
              ${e&&t
                ?`<td class="td-green">${INR(t.sales)}</td>
                  <td>${INR(e.sales?.cash)}</td>
                  <td>${INR(e.sales?.card)}</td>
                  <td>${INR(e.sales?.swiggy)}</td>
                  <td class="td-red">${INR(t.expenses)}</td>
                  <td class="td-purple">${INR(t.po)}</td>
                  <td class="td-amber">${INR(t.wastage)}</td>
                  <td class="${t.profit>=0?'td-profit-pos':'td-profit-neg'}">${INR(t.profit)}</td>`
                :`<td colspan="8" style="color:rgba(100,116,139,.4);font-style:italic;">No entry recorded</td>`
              }
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot><tr>
          <td colspan="2" style="color:var(--blue);text-transform:uppercase;font-size:10px;letter-spacing:.07em;">Week Total</td>
          <td class="td-green">${INR(wTot.sales)}</td>
          <td colspan="3"></td>
          <td class="td-red">${INR(wTot.exp)}</td>
          <td class="td-purple">${INR(wTot.po)}</td>
          <td class="td-amber">${INR(wTot.waste)}<br><span style="font-size:10px;opacity:.75">${PCT(wPct)}</span></td>
          <td class="${wTot.profit>=0?'td-profit-pos':'td-profit-neg'}">${INR(wTot.profit)}</td>
        </tr></tfoot>
      </table>
    </div>
  </div>
  `;

  $('w-prev').addEventListener('click',()=>{weeklyOffset--;renderWeekly(out);});
  $('w-next').addEventListener('click',()=>{weeklyOffset++;renderWeekly(out);});
  $('w-cur').addEventListener('click',()=>{weeklyOffset=0;renderWeekly(out);});
}

// ═══════════════════════════════════════════════════════════
// MONTHLY VIEW
// ═══════════════════════════════════════════════════════════
const now=new Date();
let monthlyYr=now.getFullYear(), monthlyMo=now.getMonth();

function renderMonthly(out){
  const days=new Date(monthlyYr,monthlyMo+1,0).getDate();
  const mEntries=Array.from({length:days},(_,i)=>{
    const ds=`${monthlyYr}-${pad(monthlyMo+1)}-${pad(i+1)}`;
    return DB.find(e=>e.date===ds)||null;
  });
  const mTot=mEntries.reduce((a,e)=>{
    if(!e)return a; const t=totals(e);
    return{sales:a.sales+t.sales,exp:a.exp+t.expenses,waste:a.waste+t.wastage,profit:a.profit+t.profit,po:a.po+t.po,cash:a.cash+(e.cashPosition?.cashInHand||0)};
  },{sales:0,exp:0,waste:0,profit:0,po:0,cash:0});
  const wPct=mTot.sales>0?(mTot.waste/mTot.sales)*100:0;

  out.innerHTML=`
  <div class="page-header">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
      <div>
        <div class="page-title">Monthly Report</div>
        <div class="page-sub">${MONTHS[monthlyMo]} ${monthlyYr} · ${days} days</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <button class="btn-ghost" id="m-prev">←</button>
        <span style="padding:8px 16px;border-radius:9px;border:1px solid var(--border2);font-size:13px;font-weight:700;color:#fff;background:rgba(255,255,255,.04);">${MONTHS[monthlyMo]} ${monthlyYr}</span>
        <button class="btn-ghost" id="m-next">→</button>
        <button class="btn-pdf" id="m-pdf">${svg(SVGS.pdf,15)} Download PDF</button>
      </div>
    </div>
  </div>

  <div class="kpi-grid">
    ${kpiCard('Total Sales',INR(mTot.sales),'This Month','trend','green',0)}
    ${kpiCard('Total Expenses',INR(mTot.exp),'This Month','warn','red',40)}
    ${kpiCard('Total POs',INR(mTot.po),'This Month','box','blue',80)}
    ${kpiCard('Total Cash EOD',INR(mTot.cash),'This Month','cash','blue',120)}
    ${kpiCard('Net Profit',INR(mTot.profit),'This Month','star',mTot.profit>=0?'green':'red',160)}
    ${kpiCard('Wastage %',PCT(wPct),'of Gross Sales','trash','amber',200)}
  </div>

  <div class="formula-banner">
    <div style="font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;">📐 Wastage % Formula</div>
    <div style="font-size:12px;color:var(--muted2);">
      Wastage % = (Total Wastage Cost ÷ Total Gross Sales) × 100
      <span style="margin-left:12px;color:#fff;font-weight:700;">= (${INR(mTot.waste)} ÷ ${INR(mTot.sales)}) × 100 = <span style="color:var(--amber)">${PCT(wPct)}</span></span>
    </div>
  </div>

  <div class="section-card" style="padding:0;">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);">
      <div class="section-title" style="margin-bottom:0;">Day-by-Day Breakdown — ${MONTHS[monthlyMo]} ${monthlyYr}</div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Day</th><th>Date</th><th>Gross Sales</th>
          <th>Cash</th><th>Card/UPI</th><th>Swiggy/Zomato</th>
          <th>Expenses</th><th>PO</th><th>Wastage</th><th>Net Profit</th>
        </tr></thead>
        <tbody>
          ${mEntries.map((e,i)=>{
            const d=new Date(monthlyYr,monthlyMo,i+1);
            const dn=DAYS[d.getDay()];
            const isSun=d.getDay()===0;
            const t=e?totals(e):null;
            return `<tr style="${isSun?'background:rgba(248,167,62,.025)':''}">
              <td style="font-weight:700;color:${isSun?'var(--amber)':'var(--blue)'}">${dn}</td>
              <td style="color:var(--muted2)">${pad(i+1)} ${MONTHS[monthlyMo]}</td>
              ${e&&t
                ?`<td class="td-green">${INR(t.sales)}</td>
                  <td>${INR(e.sales?.cash)}</td>
                  <td>${INR(e.sales?.swiggy)}</td>
                  <td>${INR(e.sales?.swiggy)}</td>
                  <td class="td-red">${INR(t.expenses)}</td>
                  <td class="td-purple">${INR(t.po)}</td>
                  <td class="td-amber">${INR(t.wastage)}</td>
                  <td class="${t.profit>=0?'td-profit-pos':'td-profit-neg'}">${INR(t.profit)}</td>`
                :`<td colspan="8" style="color:rgba(100,116,139,.3);font-style:italic;font-size:11px;">—</td>`
              }
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot><tr>
          <td colspan="2" style="color:var(--green);text-transform:uppercase;font-size:10px;letter-spacing:.07em;">Monthly Total</td>
          <td class="td-green">${INR(mTot.sales)}</td>
          <td colspan="3"></td>
          <td class="td-red">${INR(mTot.exp)}</td>
          <td class="td-purple">${INR(mTot.po)}</td>
          <td class="td-amber">${INR(mTot.waste)}<br><span style="font-size:10px">${PCT(wPct)}</span></td>
          <td class="${mTot.profit>=0?'td-profit-pos':'td-profit-neg'}">${INR(mTot.profit)}</td>
        </tr></tfoot>
      </table>
    </div>
  </div>
  `;

  $('m-prev').addEventListener('click',()=>{
    if(monthlyMo===0){monthlyMo=11;monthlyYr--;}else monthlyMo--;
    renderMonthly(out);
  });
  $('m-next').addEventListener('click',()=>{
    if(monthlyMo===11){monthlyMo=0;monthlyYr++;}else monthlyMo++;
    renderMonthly(out);
  });

  $('m-pdf').addEventListener('click',()=>downloadPDF(mEntries,mTot,wPct));
}

// ═══════════════════════════════════════════════════════════
// PDF DOWNLOAD
// ═══════════════════════════════════════════════════════════
function downloadPDF(mEntries,mTot,wPct){
  if(typeof window.jspdf==='undefined'&&typeof jsPDF==='undefined'){
    alert('PDF library not loaded. Please check your internet connection.');return;
  }
  const {jsPDF}=window.jspdf||{jsPDF:window.jsPDF};
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const W=297,H=210;

  // Background
  doc.setFillColor(7,9,15); doc.rect(0,0,W,H,'F');
  doc.setFillColor(12,17,32); doc.rect(0,0,W,42,'F');
  doc.setDrawColor(77,158,247); doc.setLineWidth(.3); doc.line(0,42,W,42);

  // Header
  doc.setTextColor(77,158,247); doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.text('SKANDAN ENTERPRISE  ·  CK\'S BAKERY FRANCHISE  ·  MONTHLY CONSOLIDATED REPORT',W/2,10,{align:'center'});
  doc.setTextColor(255,255,255); doc.setFontSize(15); doc.setFont('helvetica','bold');
  doc.text(`${MONTHS[monthlyMo].toUpperCase()} ${monthlyYr}  —  MONTHLY REPORT`,W/2,22,{align:'center'});
  doc.setTextColor(100,116,139); doc.setFontSize(7); doc.setFont('helvetica','normal');
  doc.text(`Generated: ${new Date().toLocaleString('en-IN')}  ·  Role: ${currentUser.role.toUpperCase()}  ·  ${currentUser.name}`,W/2,31,{align:'center'});

  // KPI summary row
  const kpis=[
    ['Total Sales',INR(mTot.sales),[16,217,160]],
    ['Expenses',INR(mTot.exp),[240,84,112]],
    ['PO Amount',INR(mTot.po),[77,158,247]],
    ['Cash EOD',INR(mTot.cash),[77,158,247]],
    ['Net Profit',INR(mTot.profit),mTot.profit>=0?[16,217,160]:[240,84,112]],
    ['Wastage %',PCT(wPct),[248,167,62]],
  ];
  kpis.forEach(([label,val,col],i)=>{
    const x=8+i*48;
    doc.setFillColor(20,31,46); doc.roundedRect(x,33,44,7,1,1,'F');
    doc.setTextColor(100,116,139); doc.setFontSize(5.5); doc.setFont('helvetica','normal');
    doc.text(label,x+22,37,{align:'center'});
    doc.setTextColor(...col); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(val,x+22,40.5,{align:'center'});
  });

  // Table data
  const rows=mEntries.map((e,i)=>{
    const d=new Date(monthlyYr,monthlyMo,i+1);
    const ds=`${pad(i+1)} ${MONTHS[monthlyMo]}`;
    const dn=DAYS[d.getDay()];
    if(!e) return [ds,dn,'—','—','—','—','—','—','—','—'];
    const t=totals(e);
    return [ds,dn,INR(t.sales),INR(e.sales?.cash),INR(e.sales?.card),INR(e.sales?.swiggy),INR(t.expenses),INR(t.po),INR(t.wastage),INR(t.profit)];
  });
  rows.push(['MONTHLY TOTAL','',INR(mTot.sales),'','','',INR(mTot.exp),INR(mTot.po),`${INR(mTot.waste)} (${PCT(wPct)})`,INR(mTot.profit)]);

  doc.autoTable({
    startY:45,
    head:[['Date','Day','Gross Sales','Cash','Card/UPI','Swiggy/Zomato','Expenses','PO Amount','Wastage','Net Profit']],
    body:rows,
    theme:'grid',
    styles:{fontSize:6.5,cellPadding:2,textColor:[226,232,240],fillColor:[12,17,32],lineColor:[30,41,59],lineWidth:.25,font:'helvetica'},
    headStyles:{fillColor:[7,9,15],textColor:[77,158,247],fontStyle:'bold',fontSize:7,halign:'left'},
    alternateRowStyles:{fillColor:[16,24,38]},
    columnStyles:{0:{fontStyle:'bold',textColor:[255,255,255]},2:{textColor:[16,217,160],fontStyle:'bold'},9:{fontStyle:'bold'}},
    didParseCell:d=>{
      if(d.row.index===rows.length-1){
        d.cell.styles.fillColor=[8,40,20];
        d.cell.styles.textColor=[16,217,160];
        d.cell.styles.fontStyle='bold';
      }
      if(d.section==='body'&&d.column.index===9&&d.row.index<rows.length-1){
        const v=parseFloat((rows[d.row.index][9]||'0').replace(/[^0-9.-]/g,''));
        d.cell.styles.textColor=v>=0?[16,217,160]:[240,84,112];
      }
    },
  });

  doc.save(`Skandan_Enterprise_${MONTHS[monthlyMo]}_${monthlyYr}.pdf`);
}

// Init topbar date
document.addEventListener('DOMContentLoaded',()=>{
  $('topbar-date').textContent=new Date().toLocaleDateString('en-IN',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
});
</script>
</body>
</html>
