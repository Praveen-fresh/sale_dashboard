const INR  = (n) => "₹" + Number(n||0).toLocaleString("en-IN");
const PCT  = (n) => Number(n||0).toFixed(2) + "%";
const pad  = (n) => String(n).padStart(2, "0");
const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAY_NAMES   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };

const totals = (e) => {
  if (!e) return { sales:0, expenses:0, wastage:0, po:0, profit:0 };
  const sales    = (e.sales?.cash||0)+(e.sales?.card||0)+(e.sales?.swiggy||0);
  const expenses = (e.expenses||[]).reduce((s,x)=>s+(x.amount||0),0);
  const wastage  = (e.wastage||[]).reduce((s,x)=>s+(x.cost||0),0);
  const po       = (e.purchaseOrders||[]).reduce((s,x)=>s+(x.paid||0)+(x.pending||0),0);
  return { sales, expenses, wastage, po, profit: sales-expenses-wastage };
};

// ─── AUTH SCREEN (Firebase Auth) ─────────────────────────────
function AuthScreen({ onLogin }) {
  const [email,    setEmail]    = useState("");
  const [pass,     setPass]     = useState("");
  const [err,      setErr]      = useState("");
  const [busy,     setBusy]     = useState(false);
  const [showPass, setShowPass] = useState(false);

  const submit = async (e) => {
    e?.preventDefault();
    setErr(""); setBusy(true);
    try {
      const { signInWithEmailAndPassword } = FB();
      const cred = await signInWithEmailAndPassword(getAuth(), email, pass);
      // role is stored as a custom claim or in Firestore users collection
      // For now we read from Firestore /users/{uid}
      const { getDocs, collection, doc } = FB();
      // Try to fetch user profile from Firestore
      const userDocRef = window.__firebase.doc(getDB(), "users", cred.user.uid);
      const snap = await window.__firebase.getDocs ? null : null; // placeholder
      // Fallback: derive role from email
      let role = "manager";
      let name = cred.user.displayName || cred.user.email.split("@")[0];
      let avatar = name.slice(0,2).toUpperCase();
      if (email.toLowerCase().includes("owner")) role = "owner";
      onLogin({ uid: cred.user.uid, email: cred.user.email, role, name, avatar });
    } catch (ex) {
      const msg = ex.code === "auth/invalid-credential" || ex.code === "auth/wrong-password" || ex.code === "auth/user-not-found"
        ? "Invalid email or password. Please try again."
        : ex.code === "auth/too-many-requests"
        ? "Too many attempts. Please wait a moment."
        : ex.message || "Sign in failed.";
      setErr(msg);
    }
    setBusy(false);
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,pointerEvents:"none"}}>
        <div style={{position:"absolute",top:"15%",left:"10%",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(79,156,249,.07) 0%,transparent 70%)"}}/>
        <div style={{position:"absolute",bottom:"10%",right:"8%",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(34,211,160,.06) 0%,transparent 70%)"}}/>
        <div className="grid-dots" style={{position:"absolute",inset:0,opacity:.6}}/>
      </div>

      <div style={{width:"100%",maxWidth:440,padding:"0 20px",position:"relative"}} className="fade-up">
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:58,height:58,borderRadius:16,background:"linear-gradient(135deg,#4f9cf9,#22d3a0)",marginBottom:16,boxShadow:"0 8px 32px rgba(79,156,249,.3)"}}>
            <Ico d={IC.bread} s={26}/>
          </div>
          <h1 className="syne" style={{fontSize:26,fontWeight:800,color:"#fff",letterSpacing:"-0.5px"}}>Skandan Enterprise</h1>
          <p style={{color:"var(--muted)",fontSize:13,marginTop:6,letterSpacing:"0.04em"}}>CK'S BAKERY FRANCHISE · OPERATIONS PORTAL</p>
        </div>

        <div style={{background:"var(--card)",border:"1px solid var(--border2)",borderRadius:20,padding:36,boxShadow:"0 24px 64px rgba(0,0,0,.5)"}}>
          <h2 style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:6}}>Welcome back</h2>
          <p style={{color:"var(--muted)",fontSize:13,marginBottom:28}}>Sign in with your Firebase account</p>

          <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:16}}>
            <div>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"var(--muted)",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.06em"}}>Email</label>
              <input className="ifield" type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} required />
            </div>
            <div>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"var(--muted)",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.06em"}}>Password</label>
              <div style={{position:"relative"}}>
                <input className="ifield" type={showPass?"text":"password"} placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} required style={{paddingRight:42}}/>
                <button type="button" onClick={()=>setShowPass(p=>!p)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"var(--muted)",display:"flex",alignItems:"center"}}>
                  <Ico d={IC.eye} s={15}/>
                </button>
              </div>
            </div>

            {err && (
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:9,background:"rgba(244,101,122,.1)",border:"1px solid rgba(244,101,122,.2)",color:"var(--red)",fontSize:13}}>
                <Ico d={IC.warn} s={15}/> {err}
              </div>
            )}

            <button type="submit" disabled={busy}
              style={{marginTop:4,padding:"12px 0",borderRadius:10,border:"none",background:"linear-gradient(135deg,#4f9cf9,#22d3a0)",color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:14,cursor:busy?"not-allowed":"pointer",opacity:busy?.7:1,boxShadow:"0 4px 20px rgba(79,156,249,.3)",transition:"opacity .2s,transform .15s",transform:busy?"scale(.98)":"scale(1)"}}>
              {busy ? "Signing in…" : "Sign In →"}
            </button>
          </form>

          <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid var(--border)"}}>
            <p style={{fontSize:11,color:"var(--muted)",textAlign:"center",letterSpacing:"0.06em"}}>
              💡 Use the email &amp; password set up in your <strong style={{color:"var(--blue)"}}>Firebase Authentication</strong> console.
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── SECTION / FIELD ──────────────────────────────────────────
function Section({ title, accent="blue", children }) {
  const cols={green:"#22d3a0",red:"#f4657a",blue:"#4f9cf9",amber:"#f9a94f",purple:"#a78bfa"};
  return (
    <div style={{background:"var(--card)",border:"1px solid var(--border2)",borderRadius:16,padding:"20px 22px",borderLeft:`3px solid ${cols[accent]}`}}>
      <h3 style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:16,textTransform:"uppercase",letterSpacing:"0.08em"}}>{title}</h3>
      {children}
    </div>
  );
}
function Field({ label, error, children }) {
  return (
    <div>
      {label&&<label style={{display:"block",fontSize:11,fontWeight:700,color:"var(--muted)",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</label>}
      {children}
      {error&&<p style={{fontSize:11,color:"var(--red)",marginTop:5}}>{error}</p>}
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────
function Dashboard({ entries }) {
  const last7 = entries.slice(-7);
  const today  = entries[entries.length-1];
  const td     = totals(today);
  const w7     = last7.reduce((a,e)=>{const t=totals(e);return{sales:a.sales+t.sales,exp:a.exp+t.expenses,waste:a.waste+t.wastage,profit:a.profit+t.profit};},{sales:0,exp:0,waste:0,profit:0});
  const wastePct = w7.sales>0?(w7.waste/w7.sales)*100:0;
  const max14  = Math.max(...entries.slice(-14).map(e=>totals(e).sales),1);

  if (!entries.length) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:300,gap:16,color:"var(--muted)"}}>
      <Ico d={IC.bread} s={48}/>
      <p style={{fontSize:15,fontWeight:600}}>No entries yet</p>
      <p style={{fontSize:13}}>Add your first daily entry to see data here.</p>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:24}}>
      <div className="fade-up">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div>
            <h2 className="syne" style={{fontSize:22,fontWeight:800,color:"#fff"}}>Operations Overview</h2>
            <p style={{color:"var(--muted)",fontSize:13,marginTop:3}}>CK's Bakery Franchise · Live metrics for {new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"})}</p>
          </div>
          <div style={{padding:"6px 14px",borderRadius:8,background:"rgba(34,211,160,.1)",border:"1px solid rgba(34,211,160,.2)",fontSize:12,fontWeight:700,color:"var(--green)",letterSpacing:"0.05em"}}>● LIVE</div>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:14}}>
        <MetricCard label="Today's Sales"    value={INR(td.sales)}    sub="Today"  icon={IC.trend}  accent="green"  idx={0}/>
        <MetricCard label="Today's Expenses" value={INR(td.expenses)} sub="Today"  icon={IC.warn}   accent="red"    idx={1}/>
        <MetricCard label="Cash in Hand"     value={INR(today?.cashPosition?.cashInHand)} sub="EOD" icon={IC.rupee} accent="blue"   idx={2}/>
        <MetricCard label="7-Day Wastage"    value={PCT(wastePct)}    sub="7 days" icon={IC.trash}  accent="amber"  idx={3}/>
        <MetricCard label="7-Day Net Profit" value={INR(w7.profit)}   sub="7 days" icon={IC.spark}  accent="purple" idx={4}/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:16}}>
        <div className="fade-up card-glow" style={{background:"var(--card)",border:"1px solid var(--border2)",borderRadius:18,padding:"22px 24px",animationDelay:"120ms"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
            <div>
              <h3 style={{fontSize:15,fontWeight:700,color:"#fff"}}>14-Day Sales & Expenses</h3>
              <p style={{fontSize:12,color:"var(--muted)",marginTop:3}}>Hover bars for details</p>
            </div>
            <div style={{display:"flex",gap:14}}>
              {[["Sales","var(--green)"],["Expenses","var(--red)"]].map(([l,c])=>(
                <span key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--muted)"}}>
                  <span style={{width:10,height:3,borderRadius:2,background:c,display:"inline-block"}}/>{l}
                </span>
              ))}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:150,position:"relative"}}>
            {[0,25,50,75,100].map(p=>(
              <div key={p} style={{position:"absolute",left:0,right:0,bottom:`${p}%`,borderTop:"1px solid rgba(255,255,255,.04)",pointerEvents:"none"}}/>
            ))}
            {entries.slice(-14).map((entry,i)=>{
              const t=totals(entry);
              const sh=(t.sales/max14)*100, eh=(t.expenses/max14)*100;
              return (
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,height:"100%",position:"relative"}} className="chart-col">
                  <div style={{flex:1,display:"flex",alignItems:"flex-end",gap:1.5,width:"100%",position:"relative"}}>
                    <div style={{position:"absolute",bottom:"calc(100% + 8px)",left:"50%",transform:"translateX(-50%)",background:"#1a2744",border:"1px solid var(--border2)",borderRadius:8,padding:"7px 10px",fontSize:11,whiteSpace:"nowrap",pointerEvents:"none",opacity:0,transition:"opacity .15s",zIndex:10}} className="chart-tip">
                      <div style={{color:"#94a3b8",marginBottom:3}}>{entry.date}</div>
                      <div style={{color:"var(--green)"}}>Sales: {INR(t.sales)}</div>
                      <div style={{color:"var(--red)"}}>Exp: {INR(t.expenses)}</div>
                    </div>
                    <div style={{flex:1,height:`${sh}%`,background:"linear-gradient(to top,#22d3a0,#4f9cf9)",borderRadius:"4px 4px 2px 2px",minHeight:3,transition:"height .3s ease"}}/>
                    <div style={{flex:1,height:`${eh}%`,background:"linear-gradient(to top,#f4657a,#f9a94f)",borderRadius:"4px 4px 2px 2px",minHeight:3,transition:"height .3s ease"}}/>
                  </div>
                  <span style={{fontSize:8,color:"var(--muted)",lineHeight:1}}>{DAY_NAMES[new Date(entry.date+"T00:00:00").getDay()][0]}</span>
                </div>
              );
            })}
          </div>
        </div>

        <div className="fade-up" style={{background:"var(--card)",border:"1px solid var(--border2)",borderRadius:18,padding:"22px 24px",animationDelay:"180ms"}}>
          <h3 style={{fontSize:15,fontWeight:700,color:"#fff",marginBottom:18}}>Today's Sales Breakdown</h3>
          {today && [
            ["Cash Sales",     today.sales?.cash,   "var(--green)"],
            ["Card / UPI",     today.sales?.card,   "var(--blue)"],
            ["Swiggy / Zomato",today.sales?.swiggy, "var(--amber)"],
          ].map(([label,val,col])=>{
            const pct = td.sales>0?(val/td.sales)*100:0;
            return (
              <div key={label} style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12}}>
                  <span style={{color:"var(--muted)"}}>{label}</span>
                  <span style={{color:"#fff",fontWeight:700}}>{INR(val)}</span>
                </div>
                <div style={{height:5,borderRadius:3,background:"rgba(255,255,255,.06)"}}>
                  <div style={{height:"100%",borderRadius:3,width:`${pct}%`,background:col,transition:"width .6s ease",boxShadow:`0 0 8px ${col}`}}/>
                </div>
                <p style={{fontSize:10,color:"var(--muted)",marginTop:4,textAlign:"right"}}>{pct.toFixed(1)}%</p>
              </div>
            );
          })}
          <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:"var(--muted)"}}>Total Gross</span>
            <span style={{fontSize:18,fontWeight:800,color:"#fff",fontFamily:"'Syne',sans-serif"}}>{INR(td.sales)}</span>
          </div>
        </div>
      </div>

      <div className="fade-up" style={{background:"var(--card)",border:"1px solid var(--border2)",borderRadius:18,overflow:"hidden",animationDelay:"240ms"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 24px",borderBottom:"1px solid var(--border)"}}>
          <h3 style={{fontSize:15,fontWeight:700,color:"#fff"}}>Recent 7 Days</h3>
          <span style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.07em"}}>All amounts in ₹</span>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead>
              <tr style={{background:"rgba(255,255,255,.02)"}}>
                {["Date","Day","Gross Sales","Expenses","Wastage","Net Profit","Cash In Hand"].map(h=>(
                  <th key={h} style={{padding:"10px 18px",textAlign:"left",fontSize:10,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.08em",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {entries.slice(-7).reverse().map((e,i)=>{
                const t=totals(e);
                const day=new Date(e.date+"T00:00:00").toLocaleDateString("en-IN",{weekday:"short"});
                return (
                  <tr key={e.id||i} style={{borderTop:"1px solid var(--border)",transition:"background .15s",cursor:"default"}}
                    onMouseEnter={ev=>ev.currentTarget.style.background="rgba(255,255,255,.02)"}
                    onMouseLeave={ev=>ev.currentTarget.style.background="transparent"}>
                    <td style={{padding:"12px 18px",fontWeight:600,color:"#fff",whiteSpace:"nowrap"}}>{e.date}</td>
                    <td style={{padding:"12px 18px",color:"var(--muted)"}}>{day}</td>
                    <td style={{padding:"12px 18px",fontWeight:700,color:"var(--green)"}}>{INR(t.sales)}</td>
                    <td style={{padding:"12px 18px",color:"var(--red)"}}>{INR(t.expenses)}</td>
                    <td style={{padding:"12px 18px",color:"var(--amber)"}}>{INR(t.wastage)}</td>
                    <td style={{padding:"12px 18px",fontWeight:700,color:t.profit>=0?"var(--green)":"var(--red)"}}>{INR(t.profit)}</td>
                    <td style={{padding:"12px 18px",color:"var(--blue)"}}>{INR(e.cashPosition?.cashInHand)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── DAILY ENTRY ──────────────────────────────────────────────
function DailyEntry({ entries, reloadEntries, user }) {
  const canEdit = user.role === "manager";
  const [date,    setDate]    = useState(todayStr());
  const [sales,   setSales]   = useState({cash:"",card:"",swiggy:""});
  const [exps,    setExps]    = useState([{item:"",amount:"",category:"Raw Materials"}]);
  const [pos,     setPos]     = useState([{vendor:"",invoice:"",paid:"",pending:""}]);
  const [opening, setOpening] = useState("");
  const [closing, setClosing] = useState("");
  const [waste,   setWaste]   = useState([{item:"",quantity:"",cost:""}]);
  const [cash,    setCash]    = useState({cashInHand:"",cashInBank:""});
  const [saved,   setSaved]   = useState(false);
  const [saving,  setSaving]  = useState(false);
  const [errs,    setErrs]    = useState({});

  // Auto-load existing entry when date changes
  useEffect(()=>{
    const existing = entries.find(e=>e.date===date);
    if (existing) {
      setSales(existing.sales || {cash:"",card:"",swiggy:""});
      setExps(existing.expenses?.length ? existing.expenses : [{item:"",amount:"",category:"Raw Materials"}]);
      setPos(existing.purchaseOrders?.length ? existing.purchaseOrders : [{vendor:"",invoice:"",paid:"",pending:""}]);
      setOpening(existing.openingStock ?? "");
      setClosing(existing.closingStock ?? "");
      setWaste(existing.wastage?.length ? existing.wastage : [{item:"",quantity:"",cost:""}]);
      setCash(existing.cashPosition || {cashInHand:"",cashInBank:""});
    } else {
      setSales({cash:"",card:"",swiggy:""});
      setExps([{item:"",amount:"",category:"Raw Materials"}]);
      setPos([{vendor:"",invoice:"",paid:"",pending:""}]);
      setOpening(""); setClosing("");
      setWaste([{item:"",quantity:"",cost:""}]);
      setCash({cashInHand:"",cashInBank:""});
    }
    setSaved(false); setErrs({});
  },[date, entries]);

  const upd = (setter,i,k,v) => setter(p=>p.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  const add = setter => setter(p=>[...p,{}]);
  const del = (setter,i) => setter(p=>p.filter((_,idx)=>idx!==i));

  const validate = () => {
    const e={};
    if(!date) e.date="Required";
    if(+sales.cash<0||+sales.card<0||+sales.swiggy<0) e.sales="Cannot be negative";
    exps.forEach((x,i)=>{ if(x.item&&+x.amount<0) e[`exp${i}`]="Cannot be negative"; });
    setErrs(e); return !Object.keys(e).length;
  };

  const save = async () => {
    if(!validate()) return;
    setSaving(true);
    const entry = {
      id: date,  // use date as document ID → easy lookup
      date,
      sales:{ cash:+sales.cash||0, card:+sales.card||0, swiggy:+sales.swiggy||0 },
      expenses: exps.filter(x=>x.item).map(x=>({...x,amount:+x.amount||0})),
      purchaseOrders: pos.filter(p=>p.vendor).map(p=>({...p,paid:+p.paid||0,pending:+p.pending||0})),
      openingStock:+opening||0, closingStock:+closing||0,
      wastage: waste.filter(w=>w.item).map(w=>({...w,quantity:+w.quantity||0,cost:+w.cost||0})),
      cashPosition:{ cashInHand:+cash.cashInHand||0, cashInBank:+cash.cashInBank||0 },
      updatedAt: new Date().toISOString(),
      updatedBy: user.email,
    };
    try {
      const { doc, setDoc } = FB();
      await setDoc(doc(getDB(), "entries", date), entry);
      await reloadEntries();
      setSaved(true); setTimeout(()=>setSaved(false),3500);
    } catch(ex) {
      alert("Save failed: " + ex.message);
    }
    setSaving(false);
  };

  const totalSales = (+sales.cash||0)+(+sales.card||0)+(+sales.swiggy||0);
  const totalExp   = exps.reduce((s,x)=>s+(+x.amount||0),0);

  return (
    <div style={{maxWidth:820,display:"flex",flexDirection:"column",gap:20}}>
      <div className="fade-up">
        <h2 className="syne" style={{fontSize:22,fontWeight:800,color:"#fff"}}>Daily Entry</h2>
        <p style={{color:"var(--muted)",fontSize:13,marginTop:3}}>Record today's operations data for CK's Bakery</p>
      </div>

      {!canEdit && <ReadOnlyBanner/>}

      {saved && (
        <div className="fade-up" style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderRadius:10,background:"rgba(34,211,160,.1)",border:"1px solid rgba(34,211,160,.25)",color:"var(--green)",fontSize:13}}>
          <Ico d={IC.check} s={16}/> Entry for <strong>{date}</strong> saved to Firebase!
        </div>
      )}

      <Section title="📅 Date" accent="blue">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Field label="Entry Date" error={errs.date}>
            <input className="ifield" type="date" value={date} onChange={e=>setDate(e.target.value)} max={todayStr()} disabled={!canEdit}/>
          </Field>
          <div style={{display:"flex",alignItems:"flex-end",paddingBottom:2}}>
            <div style={{padding:"12px 16px",borderRadius:10,background:"rgba(34,211,160,.06)",border:"1px solid rgba(34,211,160,.15)",width:"100%"}}>
              <p style={{fontSize:11,color:"var(--muted)",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.07em"}}>Gross Sales Preview</p>
              <p className="syne" style={{fontSize:22,fontWeight:800,color:"var(--green)"}}>{INR(totalSales)}</p>
            </div>
          </div>
        </div>
      </Section>

      <Section title="💰 Daily Gross Sales" accent="green">
        {errs.sales&&<p style={{fontSize:12,color:"var(--red)",marginBottom:10}}>{errs.sales}</p>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
          {[["Cash Sales (₹)","cash"],["Card / UPI (₹)","card"],["Swiggy / Zomato (₹)","swiggy"]].map(([l,k])=>(
            <Field key={k} label={l}>
              <input className="ifield" type="number" min="0" placeholder="0" value={sales[k]||""} onChange={e=>setSales(p=>({...p,[k]:e.target.value}))} disabled={!canEdit}/>
            </Field>
          ))}
        </div>
        {totalSales>0&&<div style={{marginTop:12,fontSize:12,color:"var(--green)"}}>Total: <strong>{INR(totalSales)}</strong></div>}
      </Section>

      <Section title="🧾 Expenses" accent="red">
        {exps.map((x,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"3fr 2fr 2fr auto",gap:10,marginBottom:10,alignItems:"end"}}>
            <Field label={i===0?"Item Name":""}>
              <input className="ifield" placeholder="e.g. Flour" value={x.item||""} onChange={e=>upd(setExps,i,"item",e.target.value)} disabled={!canEdit}/>
            </Field>
            <Field label={i===0?"Amount (₹)":""} error={errs[`exp${i}`]}>
              <input className="ifield" type="number" min="0" placeholder="0" value={x.amount||""} onChange={e=>upd(setExps,i,"amount",e.target.value)} disabled={!canEdit}/>
            </Field>
            <Field label={i===0?"Category":""}>
              <select className="ifield" value={x.category||"Raw Materials"} onChange={e=>upd(setExps,i,"category",e.target.value)} disabled={!canEdit}>
                {["Raw Materials","Utilities","Salary","Miscellaneous"].map(c=><option key={c}>{c}</option>)}
              </select>
            </Field>
            <div style={{paddingBottom:2}}>
              {canEdit&&exps.length>1&&<button onClick={()=>del(setExps,i)} style={{padding:"8px",background:"rgba(244,101,122,.1)",border:"1px solid rgba(244,101,122,.2)",borderRadius:8,cursor:"pointer",color:"var(--red)",display:"flex",alignItems:"center"}}><Ico d={IC.trash} s={14}/></button>}
            </div>
          </div>
        ))}
        {canEdit&&<button onClick={()=>add(setExps)} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:600,color:"var(--amber)",background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}><Ico d={IC.plus} s={13}/>Add Row</button>}
        {totalExp>0&&<div style={{marginTop:8,fontSize:12,color:"var(--red)"}}>Total: <strong>{INR(totalExp)}</strong></div>}
      </Section>

      <Section title="📦 Purchase Orders" accent="purple">
        {pos.map((p,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"2.5fr 2fr 1.5fr 1.5fr auto",gap:10,marginBottom:10,alignItems:"end"}}>
            <Field label={i===0?"Vendor":""}><input className="ifield" placeholder="Vendor name" value={p.vendor||""} onChange={e=>upd(setPos,i,"vendor",e.target.value)} disabled={!canEdit}/></Field>
            <Field label={i===0?"Invoice No.":""}><input className="ifield" placeholder="INV-001" value={p.invoice||""} onChange={e=>upd(setPos,i,"invoice",e.target.value)} disabled={!canEdit}/></Field>
            <Field label={i===0?"Paid (₹)":""}><input className="ifield" type="number" min="0" placeholder="0" value={p.paid||""} onChange={e=>upd(setPos,i,"paid",e.target.value)} disabled={!canEdit}/></Field>
            <Field label={i===0?"Pending (₹)":""}><input className="ifield" type="number" min="0" placeholder="0" value={p.pending||""} onChange={e=>upd(setPos,i,"pending",e.target.value)} disabled={!canEdit}/></Field>
            <div style={{paddingBottom:2}}>
              {canEdit&&pos.length>1&&<button onClick={()=>del(setPos,i)} style={{padding:"8px",background:"rgba(244,101,122,.1)",border:"1px solid rgba(244,101,122,.2)",borderRadius:8,cursor:"pointer",color:"var(--red)",display:"flex",alignItems:"center"}}><Ico d={IC.trash} s={14}/></button>}
            </div>
          </div>
        ))}
        {canEdit&&<button onClick={()=>add(setPos)} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:600,color:"var(--amber)",background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}><Ico d={IC.plus} s={13}/>Add PO</button>}
      </Section>

      <Section title="📊 Opening & Closing Stock" accent="amber">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Field label="Opening Stock Value (₹)"><input className="ifield" type="number" min="0" placeholder="0.00" value={opening} onChange={e=>setOpening(e.target.value)} disabled={!canEdit}/></Field>
          <Field label="Closing Stock Value (₹)"><input className="ifield" type="number" min="0" placeholder="0.00" value={closing} onChange={e=>setClosing(e.target.value)} disabled={!canEdit}/></Field>
        </div>
        {opening&&closing&&(
          <div style={{marginTop:10,fontSize:12,color:(+closing-(+opening))>=0?"var(--green)":"var(--amber)"}}>
            Stock Movement: <strong>{INR(+closing-(+opening))}</strong> ({(+closing-(+opening))>=0?"Gain":"Loss"})
          </div>
        )}
      </Section>

      <Section title="⚠️ Wastage Details" accent="amber">
        {waste.map((w,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"3fr 1.5fr 1.5fr auto",gap:10,marginBottom:10,alignItems:"end"}}>
            <Field label={i===0?"Item Name":""}><input className="ifield" placeholder="e.g. Bread Loaves" value={w.item||""} onChange={e=>upd(setWaste,i,"item",e.target.value)} disabled={!canEdit}/></Field>
            <Field label={i===0?"Qty":""}><input className="ifield" type="number" min="0" placeholder="0" value={w.quantity||""} onChange={e=>upd(setWaste,i,"quantity",e.target.value)} disabled={!canEdit}/></Field>
            <Field label={i===0?"Cost (₹)":""}><input className="ifield" type="number" min="0" placeholder="0" value={w.cost||""} onChange={e=>upd(setWaste,i,"cost",e.target.value)} disabled={!canEdit}/></Field>
            <div style={{paddingBottom:2}}>{canEdit&&waste.length>1&&<button onClick={()=>del(setWaste,i)} style={{padding:"8px",background:"rgba(244,101,122,.1)",border:"1px solid rgba(244,101,122,.2)",borderRadius:8,cursor:"pointer",color:"var(--red)",display:"flex",alignItems:"center"}}><Ico d={IC.trash} s={14}/></button>}</div>
          </div>
        ))}
        {canEdit&&<button onClick={()=>add(setWaste)} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:600,color:"var(--amber)",background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}><Ico d={IC.plus} s={13}/>Add Item</button>}
      </Section>

      <Section title="💵 End-of-Day Cash Position" accent="blue">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <Field label="Cash in Hand (₹)"><input className="ifield" type="number" min="0" placeholder="0.00" value={cash.cashInHand||""} onChange={e=>setCash(p=>({...p,cashInHand:e.target.value}))} disabled={!canEdit}/></Field>
          <Field label="Cash in Bank / Account (₹)"><input className="ifield" type="number" min="0" placeholder="0.00" value={cash.cashInBank||""} onChange={e=>setCash(p=>({...p,cashInBank:e.target.value}))} disabled={!canEdit}/></Field>
        </div>
      </Section>

      {canEdit ? (
        <button onClick={save} disabled={saving}
          style={{padding:"14px 0",borderRadius:12,border:"none",background:"linear-gradient(135deg,#4f9cf9,#22d3a0)",color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:15,cursor:saving?"not-allowed":"pointer",opacity:saving?.7:1,boxShadow:"0 6px 24px rgba(79,156,249,.3)",transition:"opacity .2s"}}>
          {saving ? "Saving to Firebase…" : "Save Daily Entry"}
        </button>
      ) : (
        <div style={{textAlign:"center",padding:"14px",borderRadius:12,background:"rgba(249,169,79,.06)",border:"1px solid rgba(249,169,79,.15)",color:"var(--muted)",fontSize:13}}>
          <Ico d={IC.lock} s={14}/> Entry saving is disabled for Owner accounts
        </div>
      )}
    </div>
  );
}

// ─── WEEKLY SUMMARY ───────────────────────────────────────────
function Weekly({ entries }) {
  const [offset,setOffset] = useState(0);
  const weekDates = useMemo(()=>{
    const now=new Date(); const day=now.getDay();
    const mon=new Date(now); mon.setDate(now.getDate()-(day===0?6:day-1)+offset*7);
    return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;});
  },[offset]);

  const wEntries = weekDates.map(d=>entries.find(e=>e.date===d)||null);
  const wTot = wEntries.reduce((a,e)=>{if(!e)return a;const t=totals(e);return{sales:a.sales+t.sales,exp:a.exp+t.expenses,waste:a.waste+t.wastage,profit:a.profit+t.profit,po:a.po+t.po};},{sales:0,exp:0,waste:0,profit:0,po:0});
  const wPct = wTot.sales>0?(wTot.waste/wTot.sales)*100:0;
  const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:22}}>
      <div className="fade-up" style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <h2 className="syne" style={{fontSize:22,fontWeight:800,color:"#fff"}}>Weekly Summary</h2>
          <p style={{color:"var(--muted)",fontSize:13,marginTop:3}}>{weekDates[0]} → {weekDates[6]}</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          {[["←",()=>setOffset(p=>p-1)],["This Week",()=>setOffset(0)],["→",()=>setOffset(p=>p+1)]].map(([l,fn],i)=>(
            <button key={i} onClick={fn} style={{padding:"8px 16px",borderRadius:9,border:i===1?"1px solid rgba(79,156,249,.4)":"1px solid var(--border2)",background:i===1?"rgba(79,156,249,.1)":"rgba(255,255,255,.04)",color:i===1?"var(--blue)":"var(--muted)",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:i===1?700:500,fontSize:12,cursor:"pointer",transition:"all .2s"}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(79,156,249,.5)";e.currentTarget.style.color="#fff";}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=i===1?"rgba(79,156,249,.4)":"var(--border2)";e.currentTarget.style.color=i===1?"var(--blue)":"var(--muted)";}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(165px,1fr))",gap:12}}>
        <MetricCard label="Total Sales"    value={INR(wTot.sales)}  icon={IC.trend}  accent="green"  idx={0}/>
        <MetricCard label="Total Expenses" value={INR(wTot.exp)}    icon={IC.warn}   accent="red"    idx={1}/>
        <MetricCard label="Total POs"      value={INR(wTot.po)}     icon={IC.box}    accent="blue"   idx={2}/>
        <MetricCard label="Total Wastage"  value={INR(wTot.waste)}  icon={IC.trash}  accent="amber"  idx={3}/>
        <MetricCard label="Net Profit"     value={INR(wTot.profit)} icon={IC.rupee}  accent="purple" idx={4}/>
      </div>

      <div className="fade-up" style={{background:"var(--card)",border:"1px solid var(--border2)",borderRadius:18,overflow:"hidden"}}>
        <div style={{padding:"16px 24px",borderBottom:"1px solid var(--border)"}}>
          <h3 style={{fontSize:14,fontWeight:700,color:"#fff"}}>Daily Breakdown — Mon to Sun</h3>
        </div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:"rgba(255,255,255,.02)"}}>
                {["Day","Date","Gross Sales","Cash","Card/UPI","Swiggy/Zomato","Expenses","PO","Wastage","Net Profit"].map(h=>(
                  <th key={h} style={{padding:"10px 16px",textAlign:"left",fontSize:10,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.07em",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {weekDates.map((d,i)=>{
                const e=wEntries[i]; const t=e?totals(e):null;
                return (
                  <tr key={d} style={{borderTop:"1px solid var(--border)",background:!e?"rgba(255,255,255,.005)":"transparent"}}
                    onMouseEnter={ev=>ev.currentTarget.style.background="rgba(255,255,255,.02)"}
                    onMouseLeave={ev=>ev.currentTarget.style.background=!e?"rgba(255,255,255,.005)":"transparent"}>

                <td style={{padding:"12px 16px",fontWeight:800,color:"var(--green)"}}>{INR(wTot.sales)}</td>
                <td colSpan={3}/>

                <td style={{padding:"12px 16px",fontWeight:800,color:"var(--purple)"}}>{INR(wTot.po)}</td>
                <td style={{padding:"12px 16px",fontWeight:800,color:"var(--amber)"}}>{INR(wTot.waste)} <span style={{fontSize:10,opacity:.7}}>({PCT(wPct)})</span></td>
                <td style={{padding:"12px 16px",fontWeight:800,color:wTot.profit>=0?"var(--green)":"var(--red)"}}>{INR(wTot.profit)}</td>

        </div>
      </div>
    </div>
  );
}

// ─── MONTHLY REPORT ───────────────────────────────────────────
function Monthly({ entries }) {
  const now = new Date();
  const [yr,setYr] = useState(now.getFullYear());
  const [mo,setMo] = useState(now.getMonth());

  const days = new Date(yr,mo+1,0).getDate();
  const mEntries = useMemo(()=>Array.from({length:days},(_,i)=>{
    const ds=`${yr}-${pad(mo+1)}-${pad(i+1)}`;
    return entries.find(e=>e.date===ds)||null;
  }),[entries,yr,mo,days]);

  const mTot = useMemo(()=>mEntries.reduce((a,e)=>{
    if(!e)return a; const t=totals(e);
    return{sales:a.sales+t.sales,exp:a.exp+t.expenses,waste:a.waste+t.wastage,profit:a.profit+t.profit,po:a.po+t.po,cash:a.cash+(e.cashPosition?.cashInHand||0)};
  },{sales:0,exp:0,waste:0,profit:0,po:0,cash:0}),[mEntries]);

  const wPct = mTot.sales>0?(mTot.waste/mTot.sales)*100:0;
  const prevMo = ()=>{ if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1); };
  const nextMo = ()=>{ if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1); };

  const downloadPDF = async () => {
    const { default: jsPDF } = await import("https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js").then(()=>({default:window.jspdf.jsPDF})).catch(()=>({default:null}));
    if(!jsPDF){ alert("jsPDF not available. In production: npm install jspdf jspdf-autotable"); return; }
    const doc = new jsPDF({ orientation:"landscape", unit:"mm", format:"a4" });
    const W=297, H=210;
    doc.setFillColor(8,12,20); doc.rect(0,0,W,H,"F");
    doc.setFillColor(13,20,36); doc.rect(0,0,W,40,"F");
    doc.setDrawColor(79,156,249); doc.setLineWidth(.3); doc.line(0,40,W,40);
    doc.setTextColor(79,156,249); doc.setFontSize(7); doc.setFont("helvetica","bold");
    doc.text("SKANDAN ENTERPRISE · CK'S BAKERY FRANCHISE", W/2, 10, {align:"center"});
    doc.setTextColor(255,255,255); doc.setFontSize(16);
    doc.text(`${MONTH_NAMES[mo].toUpperCase()} ${yr} — MONTHLY REPORT`, W/2, 22, {align:"center"});
    doc.setTextColor(100,116,139); doc.setFontSize(7); doc.setFont("helvetica","normal");
    doc.text(`Generated: ${new Date().toLocaleString("en-IN")}`, W/2, 30, {align:"center"});
    const rows = mEntries.map((e,i)=>{
      const ds=`${pad(i+1)} ${MONTH_NAMES[mo]}`; const dn=DAY_NAMES[new Date(yr,mo,i+1).getDay()];
      if(!e) return [ds,dn,"—","—","—","—","—","—","—","—"];
      const t=totals(e);
      return [ds,dn,INR(t.sales),INR(e.sales?.cash),INR(e.sales?.card),INR(e.sales?.swiggy),INR(t.expenses),INR(t.po),INR(t.wastage),INR(t.profit)];
    });
    rows.push(["TOTAL","",INR(mTot.sales),"","","",INR(mTot.exp),INR(mTot.po),`${INR(mTot.waste)} (${PCT(wPct)})`,INR(mTot.profit)]);
    try {
      await import("https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js").catch(()=>null);
      doc.autoTable({
        startY:44,
        head:[["Date","Day","Gross Sales","Cash","Card/UPI","Swiggy/Zomato","Expenses","PO","Wastage","Net Profit"]],
        body:rows, theme:"grid",
        styles:{fontSize:6.5,cellPadding:2.2,textColor:[226,232,240],fillColor:[13,20,36],lineColor:[30,41,59],lineWidth:.25},
        headStyles:{fillColor:[8,12,20],textColor:[79,156,249],fontStyle:"bold",fontSize:7},
        alternateRowStyles:{fillColor:[17,24,39]},
        didParseCell:d=>{if(d.row.index===rows.length-1){d.cell.styles.fillColor=[10,40,20];d.cell.styles.textColor=[34,211,160];d.cell.styles.fontStyle="bold";}},
      });
    } catch(e) { console.log("autoTable:",e); }
    doc.save(`Skandan_${MONTH_NAMES[mo]}_${yr}.pdf`);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:22}}>
      <div className="fade-up" style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <h2 className="syne" style={{fontSize:22,fontWeight:800,color:"#fff"}}>Monthly Report</h2>
          <p style={{color:"var(--muted)",fontSize:13,marginTop:3}}>{MONTH_NAMES[mo]} {yr} · {days} days</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={prevMo} style={{padding:"8px 14px",borderRadius:9,border:"1px solid var(--border2)",background:"rgba(255,255,255,.04)",color:"var(--muted)",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,cursor:"pointer"}}>←</button>
          <span style={{padding:"8px 18px",borderRadius:9,border:"1px solid var(--border2)",fontSize:13,fontWeight:700,color:"#fff",background:"rgba(255,255,255,.04)"}}>{MONTH_NAMES[mo]} {yr}</span>
          <button onClick={nextMo} style={{padding:"8px 14px",borderRadius:9,border:"1px solid var(--border2)",background:"rgba(255,255,255,.04)",color:"var(--muted)",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,cursor:"pointer"}}>→</button>
          <button onClick={downloadPDF} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 20px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#f9a94f,#f4657a)",color:"#fff",fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer",boxShadow:"0 4px 16px rgba(249,169,79,.25)"}}>
            <Ico d={IC.pdf} s={15}/>Download PDF
          </button>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>
        <MetricCard label="Total Sales"    value={INR(mTot.sales)}  icon={IC.trend}  accent="green"  idx={0}/>
        <MetricCard label="Total Expenses" value={INR(mTot.exp)}    icon={IC.warn}   accent="red"    idx={1}/>
        <MetricCard label="Total POs"      value={INR(mTot.po)}     icon={IC.box}    accent="blue"   idx={2}/>
        <MetricCard label="Total Cash EOD" value={INR(mTot.cash)}   icon={IC.rupee}  accent="blue"   idx={3}/>
        <MetricCard label="Net Profit"     value={INR(mTot.profit)} icon={IC.spark}  accent={mTot.profit>=0?"green":"red"} idx={4}/>
        <MetricCard label="Wastage %" value={PCT(wPct)} sub="of gross sales" icon={IC.trash} accent="amber" idx={5}/>
      </div>

      <div className="fade-up" style={{padding:"14px 20px",borderRadius:12,background:"rgba(249,169,79,.06)",border:"1px solid rgba(249,169,79,.18)"}}>
        <p style={{fontSize:11,fontWeight:700,color:"var(--amber)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>📐 Wastage % Formula</p>
        <p style={{fontSize:12,color:"var(--muted)"}}>
          Wastage % = (Total Wastage Cost ÷ Total Gross Sales) × 100
          <span style={{marginLeft:16,color:"#fff",fontWeight:700}}>= ({INR(mTot.waste)} ÷ {INR(mTot.sales)}) × 100 = <span style={{color:"var(--amber)"}}>{PCT(wPct)}</span></span>
        </p>
      </div>

      <div className="fade-up" style={{background:"var(--card)",border:"1px solid var(--border2)",borderRadius:18,overflow:"hidden"}}>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:"rgba(255,255,255,.03)"}}>
                {["Day","Date","Gross Sales","Cash","Card/UPI","Swiggy/Zomato","Expenses","PO","Wastage","Net Profit"].map(h=>(
                  <th key={h} style={{padding:"11px 14px",textAlign:"left",fontSize:9.5,fontWeight:700,color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.07em",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {mEntries.map((e,i)=>{
                const d=new Date(yr,mo,i+1); const dn=DAY_NAMES[d.getDay()]; const t=e?totals(e):null;
                const isSun=d.getDay()===0;
                return (
                  <tr key={i} style={{borderTop:"1px solid rgba(255,255,255,.04)",background:isSun?"rgba(249,169,79,.025)":"transparent",cursor:"default"}}
                    onMouseEnter={ev=>ev.currentTarget.style.background="rgba(255,255,255,.025)"}
                    onMouseLeave={ev=>ev.currentTarget.style.background=isSun?"rgba(249,169,79,.025)":"transparent"}>
                    <td style={{padding:"10px 14px",fontSize:11,fontWeight:700,color:isSun?"var(--amber)":"var(--blue)"}}>{dn}</td>
                    <td style={{padding:"10px 14px",color:"#94a3b8",whiteSpace:"nowrap"}}>{pad(i+1)} {MONTH_NAMES[mo]}</td>
                    {e&&t?<>
                      <td style={{padding:"10px 14px",fontWeight:700,color:"var(--green)"}}>{INR(t.sales)}</td>
                      <td style={{padding:"10px 14px",color:"#64748b"}}>{INR(e.sales?.cash)}</td>
                      <td style={{padding:"10px 14px",color:"#64748b"}}>{INR(e.sales?.card)}</td>
                      <td style={{padding:"10px 14px",color:"#64748b"}}>{INR(e.sales?.swiggy)}</td>
                      <td style={{padding:"10px 14px",color:"var(--red)"}}>{INR(t.expenses)}</td>
                      <td style={{padding:"10px 14px",color:"var(--purple)"}}>{INR(t.po)}</td>
                      <td style={{padding:"10px 14px",color:"var(--amber)"}}>{INR(t.wastage)}</td>
                      <td style={{padding:"10px 14px",fontWeight:700,color:t.profit>=0?"var(--green)":"var(--red)"}}>{INR(t.profit)}</td>
                    </>:<td colSpan={8} style={{padding:"10px 14px",color:"rgba(100,116,139,.35)",fontStyle:"italic",fontSize:11}}>—</td>}
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr style={{borderTop:"2px solid rgba(34,211,160,.2)",background:"rgba(34,211,160,.05)"}}>
                <td colSpan={2} style={{padding:"13px 14px",fontWeight:800,color:"var(--green)",fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em"}}>Monthly Total</td>
                <td style={{padding:"13px 14px",fontWeight:800,color:"var(--green)"}}>{INR(mTot.sales)}</td>
                <td colSpan={3}/>
                <td style={{padding:"13px 14px",fontWeight:800,color:"var(--red)"}}>{INR(mTot.exp)}</td>
                <td style={{padding:"13px 14px",fontWeight:800,color:"var(--purple)"}}>{INR(mTot.po)}</td>
                <td style={{padding:"13px 14px",fontWeight:800,color:"var(--amber)"}}>{INR(mTot.waste)}<br/><span style={{fontSize:10,color:"var(--amber)",opacity:.8}}>{PCT(wPct)}</span></td>
                <td style={{padding:"13px 14px",fontWeight:800,color:mTot.profit>=0?"var(--green)":"var(--red)"}}>{INR(mTot.profit)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── APP SHELL ────────────────────────────────────────────────
function App() {
  const [authChecked, setAuthChecked] = useState(false);
  const [user,        setUser]        = useState(null);
  const [entries,     setEntries]     = useState([]);
  const [loadingData, setLoadingData] = useState(false);
  const [view,        setView]        = useState("dashboard");
  const [mobileOpen,  setMO]          = useState(false);

  // ── Firebase Auth listener ──────────────────────────────────
  useEffect(()=>{
    // Wait for module script to initialise
    const interval = setInterval(()=>{
      if (!window.__auth || !window.__firebase) return;
      clearInterval(interval);
      const { onAuthStateChanged } = FB();
      onAuthStateChanged(getAuth(), async (fbUser) => {
        if (fbUser) {
          let role = "manager";
          let name = fbUser.displayName || fbUser.email.split("@")[0];
          let avatar = name.slice(0,2).toUpperCase();
          if (fbUser.email.toLowerCase().includes("owner")) role = "owner";
          setUser({ uid:fbUser.uid, email:fbUser.email, role, name, avatar });
        } else {
          setUser(null);
        }
        setAuthChecked(true);
      });
    }, 100);
    return () => clearInterval(interval);
  }, []);

  // ── Load entries from Firestore ─────────────────────────────
  const loadEntries = useCallback(async () => {
    if (!window.__db || !window.__firebase) return;
    setLoadingData(true);
    try {
      const { collection, getDocs, query, orderBy } = FB();
      const q = query(collection(getDB(), "entries"), orderBy("date", "asc"));
      const snap = await getDocs(q);
      const data = snap.docs.map(d => d.data());
      setEntries(data);
    } catch(ex) {
      console.error("Load entries error:", ex);
    }
    setLoadingData(false);
  }, []);

  useEffect(()=>{
    if (user) loadEntries();
    else setEntries([]);
  }, [user]);

  const handleLogout = async () => {
    const { signOut } = FB();
    await signOut(getAuth());
    setUser(null); setEntries([]);
  };

  if (!authChecked) return <><style>{STYLES}</style><LoadingScreen msg="Connecting to Firebase…"/></>;
  if (!user)        return <><style>{STYLES}</style><AuthScreen onLogin={setUser}/></>;

  const views = {
    dashboard: <Dashboard entries={entries}/>,
    entry:     <DailyEntry entries={entries} reloadEntries={loadEntries} user={user}/>,
    weekly:    <Weekly entries={entries}/>,
    monthly:   <Monthly entries={entries}/>,
  };

  return (
    <>
      <style>{STYLES}{`
        .chart-col:hover .chart-tip{opacity:1!important;}
        .mobile-menu-btn{display:none!important;}
        @media(max-width:768px){
          .app-sidebar{display:none!important;}
          .app-mobile-sidebar{display:flex!important;}
          .mobile-menu-btn{display:flex!important;}
        }
      `}</style>
      <div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg)"}}>
        <div className="app-sidebar">
          <Sidebar active={view} setActive={setView} user={user} onLogout={handleLogout}/>
        </div>

        {mobileOpen&&(
          <div style={{position:"fixed",inset:0,zIndex:100,display:"flex"}} className="app-mobile-sidebar">
            <div style={{flex:1,background:"rgba(0,0,0,.7)"}} onClick={()=>setMO(false)}/>
            <div style={{width:230}}>
              <Sidebar active={view} setActive={v=>{setView(v);setMO(false);}} user={user} onLogout={handleLogout}/>
            </div>
          </div>
        )}

        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <header style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 28px",borderBottom:"1px solid var(--border)",background:"var(--surface)"}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <button onClick={()=>setMO(true)} className="mobile-menu-btn" style={{padding:8,borderRadius:8,background:"rgba(255,255,255,.06)",border:"none",cursor:"pointer",color:"var(--muted)"}}>
                <Ico d={IC.menu} s={18}/>
              </button>
              <div>
                <h1 style={{fontSize:15,fontWeight:700,color:"#fff"}}>
                  {view==="dashboard"?"Operations Overview":view==="entry"?"Daily Entry":view==="weekly"?"Weekly Summary":"Monthly Report"}
                </h1>
                <p style={{fontSize:11,color:"var(--muted)",marginTop:2}}>
                  {new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}
                </p>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {loadingData && (
                <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--muted)"}}>
                  <div style={{width:14,height:14,border:"2px solid rgba(79,156,249,.3)",borderTop:"2px solid #4f9cf9",borderRadius:"50%"}} className="spinner"/>
                  Loading…
                </div>
              )}
              <div style={{padding:"5px 12px",borderRadius:7,fontSize:11,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",background:user.role==="owner"?"rgba(249,169,79,.1)":"rgba(79,156,249,.1)",color:user.role==="owner"?"var(--amber)":"var(--blue)",border:`1px solid ${user.role==="owner"?"rgba(249,169,79,.25)":"rgba(79,156,249,.25)"}`}}>
                {user.role==="owner"?"👁 View Only":"✏️ Full Access"}
              </div>
            </div>
          </header>

          <main style={{flex:1,overflowY:"auto",padding:"28px 28px 40px",background:"var(--bg)"}}>
            <div style={{maxWidth:1100,margin:"0 auto"}}>
              {views[view]}
            </div>
          </main>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
