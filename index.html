/* ── helpers ─────────────────────────────────── */
const INR=(n)=>"₹"+Number(n||0).toLocaleString("en-IN");
const PCT=(n)=>Number(n||0).toFixed(2)+"%";
const pad=(n)=>String(n).padStart(2,"0");
const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MNS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const todayStr=()=>{const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
const totals=(e)=>{
  if(!e)return{sales:0,expenses:0,wastage:0,po:0,profit:0};
  const sales=(e.sales?.cash||0)+(e.sales?.card||0)+(e.sales?.swiggy||0);
  const expenses=(e.expenses||[]).reduce((s,x)=>s+(x.amount||0),0);
  const wastage=(e.wastage||[]).reduce((s,x)=>s+(x.cost||0),0);
  const po=(e.purchaseOrders||[]).reduce((s,x)=>s+(x.paid||0)+(x.pending||0),0);
  return{sales,expenses,wastage,po,profit:sales-expenses-wastage};
};

/* ── LOADING ─────────────────────────────────── */
function Loader({msg="Loading…"}){
  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"var(--bg)",gap:14}}>
      <div style={{width:42,height:42,border:"3px solid var(--border)",borderTop:"3px solid var(--blue)",borderRadius:"50%"}} className="spinner-el"/>
      <p style={{color:"var(--muted)",fontSize:13}}>{msg}</p>
    </div>
  );
}

/* ── CONFIRM MODAL ───────────────────────────── */
function Confirm({title,msg,onOk,onCancel,danger=true}){
  return(
    <div style={{position:"fixed",inset:0,zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(15,23,42,.35)",backdropFilter:"blur(3px)"}}>
      <div className="modal-in card" style={{maxWidth:400,width:"90%",padding:28,boxShadow:"var(--shadow-lg)"}}>
        <h3 style={{fontSize:16,fontWeight:700,marginBottom:8}}>{title}</h3>
        <p style={{color:"var(--txt2)",fontSize:13,lineHeight:1.7,marginBottom:24}}>{msg}</p>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className={`btn ${danger?"btn-danger":"btn-primary"}`} onClick={onOk}>{danger?"Delete":"Confirm"}</button>
        </div>
      </div>
    </div>
  );
}

/* ── DAY DETAIL POPUP ────────────────────────── */
function DayDetail({entry,onClose,onEdit,isManager}){
  const t=totals(entry);
  const date=new Date(entry.date+"T00:00:00");
  const dateLabel=date.toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const rows=[
    {label:"Cash Sales",val:entry.sales?.cash,col:"green"},
    {label:"Card / UPI",val:entry.sales?.card,col:"blue"},
    {label:"Swiggy / Zomato",val:entry.sales?.swiggy,col:"amber"},
  ];
  return(
    <div style={{position:"fixed",inset:0,zIndex:1500,display:"flex",alignItems:"flex-start",justifyContent:"center",background:"rgba(15,23,42,.3)",backdropFilter:"blur(3px)",overflowY:"auto",padding:"40px 16px"}}>
      <div className="modal-in card" style={{width:"100%",maxWidth:700,boxShadow:"var(--shadow-lg)"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 24px",borderBottom:"1px solid var(--border)",background:"linear-gradient(135deg,#eff6ff,#f0fdf4)",borderRadius:"var(--radius-lg) var(--radius-lg) 0 0"}}>
          <div>
            <div className="tag tag-blue" style={{marginBottom:6}}>Daily Report</div>
            <h2 className="syne" style={{fontSize:20,fontWeight:800,color:"var(--txt)"}}>{dateLabel}</h2>
          </div>
          <div style={{display:"flex",gap:8}}>
            {isManager&&<button className="btn btn-primary btn-sm" onClick={onEdit}><Ico d={I.edit} s={13}/>Edit</button>}
            <button className="ic-btn" onClick={onClose}><Ico d={I.close} s={15}/></button>
          </div>
        </div>

        <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:20}}>
          {/* KPI row */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
            {[
              {label:"Gross Sales",val:INR(t.sales),col:"green"},
              {label:"Total Expenses",val:INR(t.expenses),col:"red"},
              {label:"Wastage",val:INR(t.wastage),col:"amber"},
              {label:"Net Profit",val:INR(t.profit),col:t.profit>=0?"green":"red"},
            ].map(k=>(
              <div key={k.label} style={{padding:"14px 16px",borderRadius:10,background:`var(--${k.col}-bg)`,border:`1px solid var(--${k.col}-border)`}}>
                <p style={{fontSize:10,fontWeight:700,color:`var(--${k.col})`,textTransform:"uppercase",letterSpacing:".06em",marginBottom:5}}>{k.label}</p>
                <p className="syne" style={{fontSize:18,fontWeight:800,color:`var(--${k.col})`}}>{k.val}</p>
              </div>
            ))}
          </div>

          {/* Sales breakdown */}
          <div>
            <p className="section-head" style={{marginBottom:10}}>Sales Breakdown</p>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {rows.map(r=>{
                const pct=t.sales>0?((r.val||0)/t.sales)*100:0;
                return(
                  <div key={r.label} style={{display:"flex",alignItems:"center",gap:12}}>
                    <span style={{width:120,fontSize:12,color:"var(--txt2)",flexShrink:0}}>{r.label}</span>
                    <div style={{flex:1,height:7,background:"var(--bg2)",borderRadius:4,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,background:`var(--${r.col})`,borderRadius:4}}/>
                    </div>
                    <span style={{width:80,fontSize:12,fontWeight:600,textAlign:"right",color:`var(--${r.col})`}}>{INR(r.val)}</span>
                    <span style={{width:40,fontSize:11,color:"var(--muted)",textAlign:"right"}}>{pct.toFixed(0)}%</span>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Expenses with remark */}
          {entry.expenses?.length>0&&(
            <div>
              <p className="section-head" style={{marginBottom:10}}>Expenses</p>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:"var(--bg2)"}}>
                  {["Item","Category","Amount","Remark"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left"}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {entry.expenses.map((x,i)=>(
                    <tr key={i} className="tr-hover" style={{borderTop:"1px solid var(--border)"}}>
                      <td style={{padding:"8px 12px",fontWeight:500}}>{x.item}</td>
                      <td style={{padding:"8px 12px"}}><span className={`tag tag-${x.category==="Salary"?"purple":x.category==="Utilities"?"blue":"amber"}`}>{x.category}</span></td>
                      <td style={{padding:"8px 12px",fontWeight:600,color:"var(--red)"}}>{INR(x.amount)}</td>
                      <td style={{padding:"8px 12px",color:"var(--txt2)",fontStyle:x.remark?"normal":"italic",fontSize:11}}>{x.remark||"—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* Wastage */}
          {entry.wastage?.filter(w=>w.item).length>0&&(
            <div>
              <p className="section-head" style={{marginBottom:10}}>Wastage Details</p>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:"var(--bg2)"}}>
                  {["Item","Quantity","Cost"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left"}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {entry.wastage.filter(w=>w.item).map((w,i)=>(
                    <tr key={i} className="tr-hover" style={{borderTop:"1px solid var(--border)"}}>
                      <td style={{padding:"8px 12px",fontWeight:500}}>{w.item}</td>
                      <td style={{padding:"8px 12px"}}>{w.quantity}</td>
                      <td style={{padding:"8px 12px",fontWeight:600,color:"var(--amber)"}}>{INR(w.cost)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* POs */}
          {entry.purchaseOrders?.filter(p=>p.vendor).length>0&&(
            <div>
              <p className="section-head" style={{marginBottom:10}}>Purchase Orders</p>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:"var(--bg2)"}}>
                  {["Vendor","Invoice","Paid","Pending"].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left"}}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {entry.purchaseOrders.filter(p=>p.vendor).map((p,i)=>(
                    <tr key={i} className="tr-hover" style={{borderTop:"1px solid var(--border)"}}>
                      <td style={{padding:"8px 12px",fontWeight:500}}>{p.vendor}</td>
                      <td style={{padding:"8px 12px",color:"var(--txt2)"}}>{p.invoice||"—"}</td>
                      <td style={{padding:"8px 12px",fontWeight:600,color:"var(--green)"}}>{INR(p.paid)}</td>
                      <td style={{padding:"8px 12px",fontWeight:600,color:"var(--red)"}}>{INR(p.pending)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {/* Cash position */}
          <div style={{display:"flex",gap:12}}>
            <div style={{flex:1,padding:"12px 16px",borderRadius:10,background:"var(--blue-bg)",border:"1px solid var(--blue-border)"}}>
              <p style={{fontSize:11,fontWeight:700,color:"var(--blue)",textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>Cash in Hand (EOD)</p>
              <p className="syne" style={{fontSize:18,fontWeight:800,color:"var(--blue)"}}>{INR(entry.cashPosition?.cashInHand)}</p>
            </div>
            <div style={{flex:1,padding:"12px 16px",borderRadius:10,background:"var(--green-bg)",border:"1px solid var(--green-border)"}}>
              <p style={{fontSize:11,fontWeight:700,color:"var(--green)",textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>Cash in Bank (EOD)</p>
              <p className="syne" style={{fontSize:18,fontWeight:800,color:"var(--green)"}}>{INR(entry.cashPosition?.cashInBank)}</p>
            </div>
            {(entry.openingStock||entry.closingStock)&&(
              <div style={{flex:1,padding:"12px 16px",borderRadius:10,background:"var(--amber-bg)",border:"1px solid var(--amber-border)"}}>
                <p style={{fontSize:11,fontWeight:700,color:"var(--amber)",textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>Stock O→C</p>
                <p className="syne" style={{fontSize:18,fontWeight:800,color:"var(--amber)"}}>{INR(entry.openingStock)} → {INR(entry.closingStock)}</p>
              </div>
            )}
          </div>

          {entry.updatedBy&&(
            <p style={{fontSize:11,color:"var(--muted)",textAlign:"right"}}>Last updated by {entry.updatedBy} · {entry.updatedAt?new Date(entry.updatedAt).toLocaleString("en-IN"):""}</p>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── AUTH SCREEN ─────────────────────────────── */
function AuthScreen(){
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const [sp,setSp]=useState(false);
  const submit=async(e)=>{
    e?.preventDefault();setErr("");setBusy(true);
    try{await FB().signInWithEmailAndPassword(getAu(),email,pass);}
    catch(ex){setErr(ex.code==="auth/invalid-credential"||ex.code==="auth/wrong-password"||ex.code==="auth/user-not-found"?"Invalid email or password.":ex.code==="auth/too-many-requests"?"Too many attempts.":ex.message||"Sign-in failed.");}
    setBusy(false);
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#eff6ff 0%,#f0fdf4 100%)"}}>
      <div className="fade-up" style={{width:"100%",maxWidth:420,padding:"0 20px"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:56,height:56,borderRadius:14,background:"var(--blue)",marginBottom:14,boxShadow:"0 8px 24px rgba(37,99,235,.25)"}}>
            <Ico d={I.bread} s={24} col="#fff"/>
          </div>
          <h1 className="syne" style={{fontSize:24,fontWeight:800,color:"var(--txt)"}}>Skandan Enterprise</h1>
          <p style={{color:"var(--muted)",fontSize:13,marginTop:5,letterSpacing:".04em"}}>CK'S BAKERY · OPERATIONS PORTAL</p>
        </div>
        <div className="card" style={{padding:32,boxShadow:"var(--shadow-lg)"}}>
          <h2 style={{fontSize:17,fontWeight:700,marginBottom:4}}>Sign in</h2>
          <p style={{color:"var(--muted)",fontSize:12,marginBottom:24}}>Use your Firebase account credentials</p>
          <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:14}}>
            <div>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:"var(--txt2)",marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Email</label>
              <input className="ifield" type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} required/>
            </div>
            <div>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:"var(--txt2)",marginBottom:6,textTransform:"uppercase",letterSpacing:".06em"}}>Password</label>
              <div style={{position:"relative"}}>
                <input className="ifield" type={sp?"text":"password"} placeholder="••••••••" value={pass} onChange={e=>setPass(e.target.value)} required style={{paddingRight:40}}/>
                <button type="button" onClick={()=>setSp(p=>!p)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"var(--muted)"}}><Ico d={I.eye} s={14}/></button>
              </div>
            </div>
            {err&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderRadius:8,background:"var(--red-bg)",border:"1px solid var(--red-border)",color:"var(--red)",fontSize:12}}><Ico d={I.warn} s={14}/>{err}</div>}
            <button type="submit" disabled={busy} className="btn btn-primary" style={{marginTop:4,justifyContent:"center",padding:"11px 0",fontSize:14}}>
              {busy?"Signing in…":"Sign In →"}
            </button>
          </form>
        </div>
      </div>
    </div>
  );
}

/* ── ENTRY FORM (new + edit) ─────────────────── */
function EntryForm({entries,reloadEntries,user,prefill=null,onDone=null}){
  const canEdit=user.role==="manager";
  const isEdit=!!prefill;
  const init=(e)=>({
    date:e?.date??todayStr(),
    sales:e?.sales??{cash:"",card:"",swiggy:""},
    exps:e?.expenses?.length?e.expenses.map(x=>({...x})):[{item:"",amount:"",category:"Raw Materials",remark:""}],
    pos:e?.purchaseOrders?.length?e.purchaseOrders.map(p=>({...p})):[{vendor:"",invoice:"",paid:"",pending:""}],
    opening:e?.openingStock??"",
    closing:e?.closingStock??"",
    waste:e?.wastage?.length?e.wastage.map(w=>({...w})):[{item:"",quantity:"",cost:""}],
    cash:e?.cashPosition??{cashInHand:"",cashInBank:""},
  });
  const [f,setF]=useState(init(prefill));
  const [saved,setSaved]=useState(false);
  const [saving,setSaving]=useState(false);
  const [errs,setErrs]=useState({});

  // For new entry: auto-load existing when date changes
  useEffect(()=>{
    if(isEdit)return;
    const ex=entries.find(e=>e.date===f.date);
    if(ex)setF(init(ex));
    else setF(p=>({...init(null),date:p.date}));
    setSaved(false);setErrs({});
  },[f.date,isEdit]);

  const upd=(k,v)=>setF(p=>({...p,[k]:v}));
  const updA=(k,i,fk,v)=>setF(p=>({...p,[k]:p[k].map((r,idx)=>idx===i?{...r,[fk]:v}:r)}));
  const addA=(k,blank)=>setF(p=>({...p,[k]:[...p[k],blank]}));
  const delA=(k,i)=>setF(p=>({...p,[k]:p[k].filter((_,idx)=>idx!==i)}));

  const save=async()=>{
    const e={};if(!f.date)e.date="Required";setErrs(e);if(Object.keys(e).length)return;
    setSaving(true);
    const entry={
      id:f.date,date:f.date,
      sales:{cash:+f.sales.cash||0,card:+f.sales.card||0,swiggy:+f.sales.swiggy||0},
      expenses:f.exps.filter(x=>x.item).map(x=>({item:x.item,amount:+x.amount||0,category:x.category||"Raw Materials",remark:x.remark||""})),
      purchaseOrders:f.pos.filter(p=>p.vendor).map(p=>({vendor:p.vendor,invoice:p.invoice||"",paid:+p.paid||0,pending:+p.pending||0})),
      openingStock:+f.opening||0,closingStock:+f.closing||0,
      wastage:f.waste.filter(w=>w.item).map(w=>({item:w.item,quantity:+w.quantity||0,cost:+w.cost||0})),
      cashPosition:{cashInHand:+f.cash.cashInHand||0,cashInBank:+f.cash.cashInBank||0},
      updatedAt:new Date().toISOString(),updatedBy:user.email,
    };
    try{
      await FB().setDoc(FB().doc(getDB(),"entries",f.date),entry);
      await reloadEntries();
      if(onDone){onDone();return;}
      setSaved(true);setTimeout(()=>setSaved(false),3500);
    }catch(ex){alert("Save failed: "+ex.message);}
    setSaving(false);
  };

  const totalSales=(+f.sales.cash||0)+(+f.sales.card||0)+(+f.sales.swiggy||0);
  const totalExp=f.exps.reduce((s,x)=>s+(+x.amount||0),0);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      {!isEdit&&(
        <div className="fade-up">
          <h2 className="syne" style={{fontSize:22,fontWeight:800}}>Daily Entry</h2>
          <p style={{color:"var(--muted)",fontSize:13,marginTop:3}}>Record daily operations for CK's Bakery</p>
        </div>
      )}
      {!canEdit&&<OwnerBanner/>}
      {saved&&(
        <div style={{display:"flex",alignItems:"center",gap:9,padding:"11px 14px",borderRadius:9,background:"var(--green-bg)",border:"1px solid var(--green-border)",color:"var(--green)",fontSize:13}}>
          <Ico d={I.check} s={15} col="var(--green)"/>Entry for <strong>{f.date}</strong> saved to Firebase!
        </div>
      )}

      {/* Date */}
      <Sec title="📅 Date" col="blue">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <Fld label="Entry Date" error={errs.date}>
            <input className="ifield" type="date" value={f.date} onChange={e=>upd("date",e.target.value)} max={todayStr()} disabled={!canEdit||isEdit}/>
          </Fld>
          <div style={{padding:"12px 16px",borderRadius:9,background:"var(--green-bg)",border:"1px solid var(--green-border)",display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <p style={{fontSize:11,fontWeight:700,color:"var(--green)",textTransform:"uppercase",letterSpacing:".05em",marginBottom:3}}>Gross Sales Preview</p>
            <p className="syne" style={{fontSize:22,fontWeight:800,color:"var(--green)"}}>{INR(totalSales)}</p>
          </div>
        </div>
      </Sec>

      {/* Sales */}
      <Sec title="💰 Daily Gross Sales" col="green">
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
          {[["Cash Sales (₹)","cash"],["Card / UPI (₹)","card"],["Swiggy / Zomato (₹)","swiggy"]].map(([l,k])=>(
            <Fld key={k} label={l}><input className="ifield" type="number" min="0" placeholder="0" value={f.sales[k]||""} onChange={e=>upd("sales",{...f.sales,[k]:e.target.value})} disabled={!canEdit}/></Fld>
          ))}
        </div>
        {totalSales>0&&<p style={{fontSize:12,color:"var(--green)",marginTop:10,fontWeight:600}}>Total: {INR(totalSales)}</p>}
      </Sec>

      {/* Expenses — with Remark column */}
      <Sec title="🧾 Expenses" col="red">
        {f.exps.map((x,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1.5fr 2fr auto",gap:8,marginBottom:9,alignItems:"end"}}>
            <Fld label={i===0?"Item Name":""}><input className="ifield" placeholder="e.g. Flour" value={x.item||""} onChange={e=>updA("exps",i,"item",e.target.value)} disabled={!canEdit}/></Fld>
            <Fld label={i===0?"Amount (₹)":""}><input className="ifield" type="number" min="0" placeholder="0" value={x.amount||""} onChange={e=>updA("exps",i,"amount",e.target.value)} disabled={!canEdit}/></Fld>
            <Fld label={i===0?"Category":""}>
              <select className="ifield" value={x.category||"Raw Materials"} onChange={e=>updA("exps",i,"category",e.target.value)} disabled={!canEdit}>
                {["Raw Materials","Utilities","Salary","Miscellaneous"].map(c=><option key={c}>{c}</option>)}
              </select>
            </Fld>
            <Fld label={i===0?"Remark / Note":""}><input className="ifield" placeholder="Optional note…" value={x.remark||""} onChange={e=>updA("exps",i,"remark",e.target.value)} disabled={!canEdit}/></Fld>
            <div style={{paddingBottom:2}}>{canEdit&&f.exps.length>1&&<button onClick={()=>delA("exps",i)} className="ic-btn ic-btn-red"><Ico d={I.trash} s={13} col="var(--red)"/></button>}</div>
          </div>
        ))}
        {canEdit&&<button onClick={()=>addA("exps",{item:"",amount:"",category:"Raw Materials",remark:""})} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:600,color:"var(--blue)",background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}><Ico d={I.plus} s={13} col="var(--blue)"/>Add Expense Row</button>}
        {totalExp>0&&<p style={{fontSize:12,color:"var(--red)",marginTop:8,fontWeight:600}}>Total: {INR(totalExp)}</p>}
      </Sec>

      {/* POs */}
      <Sec title="📦 Purchase Orders" col="purple">
        {f.pos.map((p,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1fr auto",gap:8,marginBottom:9,alignItems:"end"}}>
            <Fld label={i===0?"Vendor":""}><input className="ifield" placeholder="Vendor name" value={p.vendor||""} onChange={e=>updA("pos",i,"vendor",e.target.value)} disabled={!canEdit}/></Fld>
            <Fld label={i===0?"Invoice No.":""}><input className="ifield" placeholder="INV-001" value={p.invoice||""} onChange={e=>updA("pos",i,"invoice",e.target.value)} disabled={!canEdit}/></Fld>
            <Fld label={i===0?"Paid (₹)":""}><input className="ifield" type="number" min="0" placeholder="0" value={p.paid||""} onChange={e=>updA("pos",i,"paid",e.target.value)} disabled={!canEdit}/></Fld>
            <Fld label={i===0?"Pending (₹)":""}><input className="ifield" type="number" min="0" placeholder="0" value={p.pending||""} onChange={e=>updA("pos",i,"pending",e.target.value)} disabled={!canEdit}/></Fld>
            <div style={{paddingBottom:2}}>{canEdit&&f.pos.length>1&&<button onClick={()=>delA("pos",i)} className="ic-btn ic-btn-red"><Ico d={I.trash} s={13} col="var(--red)"/></button>}</div>
          </div>
        ))}
        {canEdit&&<button onClick={()=>addA("pos",{vendor:"",invoice:"",paid:"",pending:""})} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:600,color:"var(--blue)",background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}><Ico d={I.plus} s={13} col="var(--blue)"/>Add PO</button>}
      </Sec>

      {/* Stock */}
      <Sec title="📊 Opening & Closing Stock" col="amber">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <Fld label="Opening Stock Value (₹)"><input className="ifield" type="number" min="0" placeholder="0.00" value={f.opening} onChange={e=>upd("opening",e.target.value)} disabled={!canEdit}/></Fld>
          <Fld label="Closing Stock Value (₹)"><input className="ifield" type="number" min="0" placeholder="0.00" value={f.closing} onChange={e=>upd("closing",e.target.value)} disabled={!canEdit}/></Fld>
        </div>
        {f.opening&&f.closing&&(
          <p style={{fontSize:12,marginTop:8,fontWeight:600,color:(+f.closing-(+f.opening))>=0?"var(--green)":"var(--amber)"}}>
            Stock Movement: {INR(+f.closing-(+f.opening))} ({(+f.closing-(+f.opening))>=0?"Gain":"Loss"})
          </p>
        )}
      </Sec>

      {/* Wastage */}
      <Sec title="⚠️ Wastage Details" col="amber">
        {f.waste.map((w,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"3fr 1fr 1fr auto",gap:8,marginBottom:9,alignItems:"end"}}>
            <Fld label={i===0?"Item Name":""}><input className="ifield" placeholder="e.g. Bread Loaves" value={w.item||""} onChange={e=>updA("waste",i,"item",e.target.value)} disabled={!canEdit}/></Fld>
            <Fld label={i===0?"Qty":""}><input className="ifield" type="number" min="0" placeholder="0" value={w.quantity||""} onChange={e=>updA("waste",i,"quantity",e.target.value)} disabled={!canEdit}/></Fld>
            <Fld label={i===0?"Cost (₹)":""}><input className="ifield" type="number" min="0" placeholder="0" value={w.cost||""} onChange={e=>updA("waste",i,"cost",e.target.value)} disabled={!canEdit}/></Fld>
            <div style={{paddingBottom:2}}>{canEdit&&f.waste.length>1&&<button onClick={()=>delA("waste",i)} className="ic-btn ic-btn-red"><Ico d={I.trash} s={13} col="var(--red)"/></button>}</div>
          </div>
        ))}
        {canEdit&&<button onClick={()=>addA("waste",{item:"",quantity:"",cost:""})} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:600,color:"var(--blue)",background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}><Ico d={I.plus} s={13} col="var(--blue)"/>Add Wastage Item</button>}
      </Sec>

      {/* Cash */}
      <Sec title="💵 End-of-Day Cash Position" col="blue">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <Fld label="Cash in Hand (₹)"><input className="ifield" type="number" min="0" placeholder="0.00" value={f.cash.cashInHand||""} onChange={e=>upd("cash",{...f.cash,cashInHand:e.target.value})} disabled={!canEdit}/></Fld>
          <Fld label="Cash in Bank / Account (₹)"><input className="ifield" type="number" min="0" placeholder="0.00" value={f.cash.cashInBank||""} onChange={e=>upd("cash",{...f.cash,cashInBank:e.target.value})} disabled={!canEdit}/></Fld>
        </div>
      </Sec>

      {canEdit?(
        <div style={{display:"flex",gap:10}}>
          {onDone&&<button className="btn btn-ghost" onClick={onDone}>Cancel</button>}
          <button className="btn btn-primary" onClick={save} disabled={saving} style={{flex:1,justifyContent:"center",padding:"12px 0",fontSize:14}}>
            {saving?(isEdit?"Updating…":"Saving…"):(isEdit?"Update Entry":"Save Daily Entry")}
          </button>
        </div>
      ):(
        <div style={{textAlign:"center",padding:"13px",borderRadius:9,background:"var(--amber-bg)",border:"1px solid var(--amber-border)",color:"var(--amber)",fontSize:13}}>
          <Ico d={I.lock} s={14} col="var(--amber)"/> Entry saving is disabled for Owner accounts
        </div>
      )}
    </div>
  );
}

/* ── EDIT MODAL ──────────────────────────────── */
function EditModal({entry,entries,reloadEntries,user,onClose}){
  return(
    <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"flex-start",justifyContent:"center",background:"rgba(15,23,42,.3)",backdropFilter:"blur(3px)",overflowY:"auto",padding:"32px 16px"}}>
      <div className="modal-in card" style={{width:"100%",maxWidth:860,boxShadow:"var(--shadow-lg)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 22px",borderBottom:"1px solid var(--border)",background:"var(--blue-bg)"}}>
          <div>
            <h2 className="syne" style={{fontSize:19,fontWeight:800}}>Edit Entry</h2>
            <p style={{color:"var(--txt2)",fontSize:13,marginTop:2}}>Editing <strong>{entry.date}</strong></p>
          </div>
          <button className="ic-btn" onClick={onClose}><Ico d={I.close} s={15}/></button>
        </div>
        <div style={{padding:"22px"}}>
          <EntryForm entries={entries} reloadEntries={reloadEntries} user={user} prefill={entry} onDone={onClose}/>
        </div>
      </div>
    </div>
  );
}

/* ── ALL ENTRIES ─────────────────────────────── */
function AllEntries({entries,reloadEntries,user,onViewDate}){
  const isMgr=user.role==="manager";
  const [editE,setEditE]=useState(null);
  const [delE,setDelE]=useState(null);
  const [deleting,setDeleting]=useState(false);
  const [search,setSearch]=useState("");
  const [sortDir,setSortDir]=useState("desc");

  const filtered=useMemo(()=>{
    let list=[...entries];
    if(search)list=list.filter(e=>e.date.includes(search)||e.expenses?.some(x=>x.item?.toLowerCase().includes(search.toLowerCase())));
    list.sort((a,b)=>sortDir==="desc"?b.date.localeCompare(a.date):a.date.localeCompare(b.date));
    return list;
  },[entries,search,sortDir]);

  const doDelete=async()=>{
    if(!delE)return;setDeleting(true);
    try{await FB().deleteDoc(FB().doc(getDB(),"entries",delE.date));await reloadEntries();}
    catch(ex){alert("Delete failed: "+ex.message);}
    setDeleting(false);setDelE(null);
  };

  return(
    <>
      {editE&&<EditModal entry={editE} entries={entries} reloadEntries={reloadEntries} user={user} onClose={()=>setEditE(null)}/>}
      {delE&&<Confirm title="Delete Entry" msg={`Permanently delete the entry for ${delE.date}? This action cannot be undone.`} onOk={doDelete} onCancel={()=>setDelE(null)}/>}
      <div style={{display:"flex",flexDirection:"column",gap:18}}>
        <div className="fade-up" style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div>
            <h2 className="syne" style={{fontSize:22,fontWeight:800}}>All Entries</h2>
            <p style={{color:"var(--muted)",fontSize:13,marginTop:3}}>{entries.length} total records · click any row to view full report</p>
          </div>
          {!isMgr&&<span className="tag tag-amber"><Ico d={I.lock} s={11} col="var(--amber)"/>View-only</span>}
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <input className="ifield" placeholder="Search by date (e.g. 2026-05) or item name…" value={search} onChange={e=>setSearch(e.target.value)} style={{maxWidth:340}}/>
          <button className="btn btn-ghost btn-sm" onClick={()=>setSortDir(d=>d==="desc"?"asc":"desc")}>
            {sortDir==="desc"?"↓ Newest first":"↑ Oldest first"}
          </button>
          <span style={{fontSize:12,color:"var(--muted)",marginLeft:"auto"}}>{filtered.length} shown</span>
        </div>
        {filtered.length===0?(
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:200,gap:12,color:"var(--muted)"}}>
            <Ico d={I.list} s={38}/><p style={{fontSize:14}}>{entries.length===0?"No entries yet.":"No matches found."}</p>
          </div>
        ):(
          <div className="card" style={{overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead><tr style={{background:"var(--bg2)"}}>
                  {["Date","Day","Gross Sales","Expenses","Expense Items","Wastage","Net Profit","Cash in Hand",isMgr?"Actions":""].filter(Boolean).map(h=>(
                    <th key={h} style={{padding:"10px 14px",textAlign:"left"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {filtered.map((e)=>{
                    const t=totals(e),isSun=new Date(e.date+"T00:00:00").getDay()===0;
                    // expense summary for table
                    const expSummary=(e.expenses||[]).filter(x=>x.item).slice(0,2).map(x=>`${x.item}${x.remark?" ("+x.remark+")":""}`).join(", ")+(e.expenses?.length>2?` +${e.expenses.length-2} more`:"");
                    return(
                      <tr key={e.date} className="tr-hover" style={{borderTop:"1px solid var(--border)",cursor:"pointer"}} onClick={()=>onViewDate(e)}>
                        <td style={{padding:"10px 14px",fontWeight:700}}>{e.date}</td>
                        <td style={{padding:"10px 14px",fontWeight:600,color:isSun?"var(--amber)":"var(--blue)",fontSize:11}}>{DN[new Date(e.date+"T00:00:00").getDay()]}</td>
                        <td style={{padding:"10px 14px",fontWeight:700,color:"var(--green)"}}>{INR(t.sales)}</td>
                        <td style={{padding:"10px 14px",color:"var(--red)"}}>{INR(t.expenses)}</td>
                        <td style={{padding:"10px 14px",color:"var(--txt2)",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:11}}>{expSummary||"—"}</td>
                        <td style={{padding:"10px 14px",color:"var(--amber)"}}>{INR(t.wastage)}</td>
                        <td style={{padding:"10px 14px",fontWeight:700,color:t.profit>=0?"var(--green)":"var(--red)"}}>{INR(t.profit)}</td>
                        <td style={{padding:"10px 14px",color:"var(--blue)"}}>{INR(e.cashPosition?.cashInHand)}</td>
                        {isMgr&&(
                          <td style={{padding:"8px 14px"}} onClick={ev=>ev.stopPropagation()}>
                            <div style={{display:"flex",gap:6}}>
                              <button className="ic-btn ic-btn-blue" title="Edit" onClick={()=>setEditE(e)}><Ico d={I.edit} s={13} col="var(--blue)"/></button>
                              <button className="ic-btn ic-btn-red" title="Delete" onClick={()=>setDelE(e)}><Ico d={I.trash} s={13} col="var(--red)"/></button>
                            </div>
                          </td>
                        )}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </>
  );
}

/* ── MONTHLY REPORT ──────────────────────────── */
function Monthly({entries,onViewDate,user}){
  const now=new Date();
  const [yr,setYr]=useState(now.getFullYear());
  const [mo,setMo]=useState(now.getMonth());
  const [pdfBusy,setPdfBusy]=useState(false);
  const isMgr=user.role==="manager";
  const [editE,setEditE]=useState(null);

  const days=new Date(yr,mo+1,0).getDate();
  const mEntries=useMemo(()=>Array.from({length:days},(_,i)=>{
    const ds=`${yr}-${pad(mo+1)}-${pad(i+1)}`;
    return entries.find(e=>e.date===ds)||null;
  }),[entries,yr,mo,days]);

  const mTot=useMemo(()=>mEntries.reduce((a,e)=>{
    if(!e)return a;const t=totals(e);
    return{sales:a.sales+t.sales,exp:a.exp+t.expenses,waste:a.waste+t.wastage,profit:a.profit+t.profit,po:a.po+t.po,cash:a.cash+(e.cashPosition?.cashInHand||0)};
  },{sales:0,exp:0,waste:0,profit:0,po:0,cash:0}),[mEntries]);

  const wPct=mTot.sales>0?(mTot.waste/mTot.sales)*100:0;
  const prevMo=()=>{if(mo===0){setMo(11);setYr(y=>y-1);}else setMo(m=>m-1);};
  const nextMo=()=>{if(mo===11){setMo(0);setYr(y=>y+1);}else setMo(m=>m+1);};

  const downloadPDF=async()=>{
    setPdfBusy(true);
    try{
      // load jsPDF
      if(!window.jspdf){
        await new Promise((res,rej)=>{
          const s=document.createElement("script");
          s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
          s.onload=res;s.onerror=rej;document.head.appendChild(s);
        });
      }
      if(!window.jspdf?.jsPDF){setPdfBusy(false);alert("jsPDF failed to load.");return;}
      await new Promise((res,rej)=>{
        const s=document.createElement("script");
        s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js";
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
      const W=297;
      // Header bg
      doc.setFillColor(239,246,255);doc.rect(0,0,W,42,"F");
      doc.setDrawColor(37,99,235);doc.setLineWidth(.5);doc.line(0,42,W,42);
      // Logo area
      doc.setFillColor(37,99,235);doc.roundedRect(10,8,26,26,3,3,"F");
      doc.setTextColor(255,255,255);doc.setFontSize(13);doc.setFont("helvetica","bold");doc.text("SE",23,24,{align:"center"});
      // Title
      doc.setTextColor(30,41,59);doc.setFontSize(16);doc.setFont("helvetica","bold");
      doc.text("SKANDAN ENTERPRISE",44,16);
      doc.setFontSize(9);doc.setTextColor(100,116,139);doc.setFont("helvetica","normal");
      doc.text("CK's Bakery Franchise · Operations Report",44,23);
      doc.setFontSize(12);doc.setFont("helvetica","bold");doc.setTextColor(37,99,235);
      doc.text(`${MN[mo].toUpperCase()} ${yr}`,44,31);
      // KPIs
      const kpis=[
        {l:"Total Sales",v:INR(mTot.sales),c:[5,150,105]},
        {l:"Total Expenses",v:INR(mTot.exp),c:[220,38,38]},
        {l:"Total POs",v:INR(mTot.po),c:[37,99,235]},
        {l:"Net Profit",v:INR(mTot.profit),c:mTot.profit>=0?[5,150,105]:[220,38,38]},
        {l:"Wastage %",v:PCT(wPct),c:[217,119,6]},
      ];
      kpis.forEach((k,i)=>{
        const x=10+i*57,y=46;
        doc.setFillColor(248,250,252);doc.roundedRect(x,y,54,18,2,2,"F");
        doc.setDrawColor(...k.c);doc.setLineWidth(.4);doc.line(x,y,x,y+18);
        doc.setTextColor(...k.c);doc.setFontSize(14);doc.setFont("helvetica","bold");
        doc.text(k.v,x+28,y+11,{align:"center"});
        doc.setTextColor(100,116,139);doc.setFontSize(6.5);doc.setFont("helvetica","normal");
        doc.text(k.l.toUpperCase(),x+28,y+16,{align:"center"});
      });
      // Table
      const head=[["#","Date","Day","Gross Sales","Cash","Card/UPI","Swiggy","Expenses","Expense Remarks","PO","Wastage","Net Profit","Cash EOD"]];
      const rows=mEntries.map((e,i)=>{
        const ds=`${pad(i+1)} ${MNS[mo]}`,dn=DN[new Date(yr,mo,i+1).getDay()];
        if(!e)return[String(i+1),ds,dn,"—","—","—","—","—","—","—","—","—","—"];
        const t=totals(e);
        const remarks=(e.expenses||[]).filter(x=>x.item).map(x=>x.remark?`${x.item}: ${x.remark}`:x.item).join("; ")||"—";
        return[String(i+1),ds,dn,INR(t.sales),INR(e.sales?.cash),INR(e.sales?.card),INR(e.sales?.swiggy),INR(t.expenses),remarks,INR(t.po),INR(t.wastage),INR(t.profit),INR(e.cashPosition?.cashInHand)];
      });
      rows.push(["","TOTAL","",INR(mTot.sales),"","","",INR(mTot.exp),"",INR(mTot.po),`${INR(mTot.waste)} (${PCT(wPct)})`,INR(mTot.profit),"─"]);
      doc.autoTable({
        startY:68,head,body:rows,theme:"grid",
        styles:{fontSize:6.2,cellPadding:1.8,textColor:[30,41,59],fillColor:[255,255,255],lineColor:[226,232,240],lineWidth:.2},
        headStyles:{fillColor:[30,41,59],textColor:[255,255,255],fontStyle:"bold",fontSize:6.5},
        alternateRowStyles:{fillColor:[248,250,252]},
        columnStyles:{0:{cellWidth:6},1:{cellWidth:16},2:{cellWidth:9},8:{cellWidth:40},11:{cellWidth:18}},
        didParseCell:d=>{
          if(d.row.index===rows.length-1){d.cell.styles.fillColor=[239,246,255];d.cell.styles.fontStyle="bold";d.cell.styles.textColor=[5,150,105];}
          if(d.section==="body"&&d.column.index===11&&d.row.index<rows.length-1){
            const v=d.cell.raw;if(v&&v!=="—"){const n=Number(v.replace(/[₹,]/g,""));d.cell.styles.textColor=n>=0?[5,150,105]:[220,38,38];}
          }
        },
      });
      // Footer
      const finalY=doc.lastAutoTable.finalY+6;
      doc.setFontSize(7);doc.setTextColor(148,163,184);doc.setFont("helvetica","normal");
      doc.text(`Generated: ${new Date().toLocaleString("en-IN")} · Skandan Enterprise · Confidential`,W/2,finalY,{align:"center"});
      doc.save(`Skandan_${MN[mo]}_${yr}.pdf`);
    }catch(ex){alert("PDF error: "+ex.message);}
    setPdfBusy(false);
  };

  return(
    <>
      {editE&&<EditModal entry={editE} entries={entries} reloadEntries={()=>{}} user={user} onClose={()=>setEditE(null)}/>}
      <div style={{display:"flex",flexDirection:"column",gap:20}}>
        <div className="fade-up" style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div>
            <h2 className="syne" style={{fontSize:22,fontWeight:800}}>Monthly Report</h2>
            <p style={{color:"var(--muted)",fontSize:13,marginTop:3}}>{MN[mo]} {yr} · {days} days · click any row to view day report</p>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn btn-ghost btn-sm" onClick={prevMo}>←</button>
            <span style={{padding:"6px 16px",borderRadius:8,border:"1.5px solid var(--border)",fontSize:13,fontWeight:700,background:"var(--card)"}}>{MNS[mo]} {yr}</span>
            <button className="btn btn-ghost btn-sm" onClick={nextMo}>→</button>
            <button className="btn btn-sm" onClick={downloadPDF} disabled={pdfBusy}
              style={{background:"linear-gradient(135deg,var(--red),var(--amber))",color:"#fff",border:"none",boxShadow:"0 2px 8px rgba(220,38,38,.2)"}}>
              <Ico d={I.pdf} s={13} col="#fff"/>
              {pdfBusy?"Generating…":"Download PDF"}
            </button>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:12}}>
          <KCard label="Total Sales"    value={INR(mTot.sales)}  icon={I.trend}  col="green"  idx={0}/>
          <KCard label="Total Expenses" value={INR(mTot.exp)}    icon={I.warn}   col="red"    idx={1}/>
          <KCard label="Total POs"      value={INR(mTot.po)}     icon={I.box}    col="blue"   idx={2}/>
          <KCard label="Cash EOD"       value={INR(mTot.cash)}   icon={I.rupee}  col="blue"   idx={3}/>
          <KCard label="Net Profit"     value={INR(mTot.profit)} icon={I.spark}  col={mTot.profit>=0?"green":"red"} idx={4}/>
          <KCard label="Wastage %"      value={PCT(wPct)}        icon={I.trash}  col="amber"  idx={5} sub="of sales"/>
        </div>

        <div style={{padding:"12px 18px",borderRadius:10,background:"var(--amber-bg)",border:"1px solid var(--amber-border)"}}>
          <p style={{fontSize:11,fontWeight:700,color:"var(--amber)",textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>📐 Wastage % Formula</p>
          <p style={{fontSize:12,color:"var(--txt2)"}}>Wastage % = (Total Wastage Cost ÷ Gross Sales) × 100 &nbsp;=&nbsp; ({INR(mTot.waste)} ÷ {INR(mTot.sales)}) × 100 = <strong style={{color:"var(--amber)"}}>{PCT(wPct)}</strong></p>
        </div>

        <div className="card" style={{overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:"var(--bg2)"}}>
                {["Day","Date","Gross Sales","Cash","Card/UPI","Swiggy","Expenses","Expense Items & Remarks","PO","Wastage","Net Profit","Cash EOD",isMgr?"":""].filter(Boolean).map(h=>(
                  <th key={h} style={{padding:"10px 13px",textAlign:"left"}}>{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {mEntries.map((e,i)=>{
                  const d=new Date(yr,mo,i+1),dn=DN[d.getDay()],t=e?totals(e):null,isSun=d.getDay()===0;
                  const expRemarks=e?(e.expenses||[]).filter(x=>x.item).map(x=>x.remark?`${x.item}: ${x.remark}`:x.item).join(" · ")||"—":"";
                  return(
                    <tr key={i} className="tr-hover" style={{borderTop:"1px solid var(--border)",background:isSun?"rgba(217,119,6,.04)":"transparent",cursor:e?"pointer":"default"}}
                      onClick={()=>e&&onViewDate(e)}>
                      <td style={{padding:"9px 13px",fontWeight:700,color:isSun?"var(--amber)":"var(--blue)",fontSize:11}}>{dn}</td>
                      <td style={{padding:"9px 13px",color:"var(--txt2)",whiteSpace:"nowrap"}}>{pad(i+1)} {MNS[mo]}</td>
                      {e&&t?<>
                        <td style={{padding:"9px 13px",fontWeight:700,color:"var(--green)"}}>{INR(t.sales)}</td>
                        <td style={{padding:"9px 13px",color:"var(--txt2)"}}>{INR(e.sales?.cash)}</td>
                        <td style={{padding:"9px 13px",color:"var(--txt2)"}}>{INR(e.sales?.card)}</td>
                        <td style={{padding:"9px 13px",color:"var(--txt2)"}}>{INR(e.sales?.swiggy)}</td>
                        <td style={{padding:"9px 13px",color:"var(--red)",fontWeight:600}}>{INR(t.expenses)}</td>
                        <td style={{padding:"9px 13px",color:"var(--txt2)",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:11}}>{expRemarks}</td>
                        <td style={{padding:"9px 13px",color:"var(--purple)"}}>{INR(t.po)}</td>
                        <td style={{padding:"9px 13px",color:"var(--amber)"}}>{INR(t.wastage)}</td>
                        <td style={{padding:"9px 13px",fontWeight:700,color:t.profit>=0?"var(--green)":"var(--red)"}}>{INR(t.profit)}</td>
                        <td style={{padding:"9px 13px",color:"var(--blue)"}}>{INR(e.cashPosition?.cashInHand)}</td>
                        {isMgr&&(
                          <td style={{padding:"7px 13px"}} onClick={ev=>ev.stopPropagation()}>
                            <button className="ic-btn ic-btn-blue" title="Edit" onClick={()=>setEditE(e)}><Ico d={I.edit} s={12} col="var(--blue)"/></button>
                          </td>
                        )}
                      </>:<>
                        <td colSpan={isMgr?10:9} style={{padding:"9px 13px",color:"var(--muted)",fontStyle:"italic",fontSize:11}}>— no entry —</td>
                      </>}
                    </tr>
                  );
                })}
              </tbody>
              <tfoot><tr style={{borderTop:"2px solid var(--green-border)",background:"var(--green-bg)"}}>
                <td colSpan={2} style={{padding:"11px 13px",fontWeight:800,color:"var(--green)",fontSize:11,textTransform:"uppercase",letterSpacing:".06em"}}>Monthly Total</td>
                <td style={{padding:"11px 13px",fontWeight:800,color:"var(--green)"}}>{INR(mTot.sales)}</td>
                <td colSpan={3}/>
                <td style={{padding:"11px 13px",fontWeight:800,color:"var(--red)"}}>{INR(mTot.exp)}</td>
                <td/>
                <td style={{padding:"11px 13px",fontWeight:800,color:"var(--purple)"}}>{INR(mTot.po)}</td>
                <td style={{padding:"11px 13px",fontWeight:800,color:"var(--amber)"}}>{INR(mTot.waste)} <span style={{fontSize:10,opacity:.8}}>({PCT(wPct)})</span></td>
                <td style={{padding:"11px 13px",fontWeight:800,color:mTot.profit>=0?"var(--green)":"var(--red)"}}>{INR(mTot.profit)}</td>
                <td>{INR(mTot.cash)}</td>
                {isMgr&&<td/>}
              </tr></tfoot>
            </table>
          </div>
        </div>
      </div>
    </>
  );
}

/* ── APP ─────────────────────────────────────── */
function App(){
  const [authOk,setAuthOk]=useState(false);
  const [user,setUser]=useState(null);
  const [entries,setEntries]=useState([]);
  const [loading,setLoading]=useState(false);
  const [view,setView]=useState("dashboard");
  const [mob,setMob]=useState(false);
  const [dayDetail,setDayDetail]=useState(null); // entry to show in popup
  const [editFromDetail,setEditFromDetail]=useState(null); // edit modal from popup

  useEffect(()=>{
    const iv=setInterval(()=>{
      if(!window.__auth||!window.__firebase)return;
      clearInterval(iv);
      FB().onAuthStateChanged(getAu(),fbUser=>{
        if(fbUser){
          const role=fbUser.email.toLowerCase().includes("owner")?"owner":"manager";
          const name=fbUser.displayName||fbUser.email.split("@")[0];
          setUser({uid:fbUser.uid,email:fbUser.email,role,name,avatar:name.slice(0,2).toUpperCase()});
        }else setUser(null);
        setAuthOk(true);
      });
    },100);
    return()=>clearInterval(iv);
  },[]);

  const loadEntries=useCallback(async()=>{
    if(!window.__db||!window.__firebase)return;
    setLoading(true);
    try{
      const{collection,getDocs,query,orderBy}=FB();
      const snap=await getDocs(query(collection(getDB(),"entries"),orderBy("date","asc")));
      setEntries(snap.docs.map(d=>d.data()));
    }catch(ex){console.error(ex);}
    setLoading(false);
  },[]);

  useEffect(()=>{if(user)loadEntries();else setEntries([]);},[user]);

  const logout=async()=>{await FB().signOut(getAu());setUser(null);setEntries([]);};

  const viewDate=(entry)=>setDayDetail(entry);
  const openEditFromDetail=(entry)=>{setDayDetail(null);setEditFromDetail(entry);};

  if(!authOk)return<><style>{STYLES}</style><Loader msg="Connecting to Firebase…"/></>;
  if(!user)return<><style>{STYLES}</style><AuthScreen/></>;

  const vtitle={dashboard:"Operations Overview",entry:"Daily Entry",entries:"All Entries",monthly:"Monthly Report"};

  return(
    <>
      <style>{STYLES}{`
        .mobile-btn{display:none!important;}
        @media(max-width:768px){
          .app-side{display:none!important;}
          .app-mob-side{display:flex!important;}
          .mobile-btn{display:flex!important;}
        }
      `}</style>

      {/* Day Detail Popup */}
      {dayDetail&&<DayDetail entry={dayDetail} onClose={()=>setDayDetail(null)} onEdit={()=>openEditFromDetail(dayDetail)} isManager={user.role==="manager"}/>}

      {/* Edit modal triggered from day detail */}
      {editFromDetail&&<EditModal entry={editFromDetail} entries={entries} reloadEntries={loadEntries} user={user} onClose={()=>setEditFromDetail(null)}/>}

      <div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg)"}}>
        {/* Desktop sidebar */}
        <div className="app-side"><Sidebar active={view} setActive={setView} user={user} onLogout={logout}/></div>

        {/* Mobile sidebar */}
        {mob&&(
          <div style={{position:"fixed",inset:0,zIndex:300,display:"flex"}} className="app-mob-side">
            <div style={{flex:1,background:"rgba(15,23,42,.35)"}} onClick={()=>setMob(false)}/>
            <div style={{width:220}}><Sidebar active={view} setActive={v=>{setView(v);setMob(false);}} user={user} onLogout={logout}/></div>
          </div>
        )}

        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          {/* Topbar */}
          <header style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 24px",borderBottom:"1px solid var(--border)",background:"var(--surface)",boxShadow:"0 1px 0 var(--border)"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={()=>setMob(true)} className="ic-btn mobile-btn" style={{flexShrink:0}}><Ico d={I.menu} s={16}/></button>
              <div>
                <h1 style={{fontSize:15,fontWeight:700}}>{vtitle[view]}</h1>
                <p style={{fontSize:11,color:"var(--muted)",marginTop:1}}>{new Date().toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {loading&&(
                <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"var(--muted)"}}>
                  <div style={{width:13,height:13,border:"2px solid var(--border)",borderTop:"2px solid var(--blue)",borderRadius:"50%"}} className="spinner-el"/>Syncing…
                </div>
              )}
              <span className={`tag ${user.role==="owner"?"tag-amber":"tag-blue"}`}>
                {user.role==="owner"?"👁 Owner":"✏️ Manager"} · {user.name}
              </span>
            </div>
          </header>

          {/* Main */}
          <main style={{flex:1,overflowY:"auto",padding:"24px 24px 40px",background:"var(--bg)"}}>
            <div style={{maxWidth:1120,margin:"0 auto"}}>
              {view==="dashboard"&&<Dashboard entries={entries} onViewDate={viewDate}/>}
              {view==="entry"&&<EntryForm entries={entries} reloadEntries={loadEntries} user={user}/>}
              {view==="entries"&&<AllEntries entries={entries} reloadEntries={loadEntries} user={user} onViewDate={viewDate}/>}
              {view==="monthly"&&<Monthly entries={entries} onViewDate={viewDate} user={user} reloadEntries={loadEntries}/>}
            </div>
          </main>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
